      html+=`<div class="xc" style="margin-bottom:14px"><div class="xh" style="background:#1B3A2D"><h3>📅 ${md.ref} — ${md.topic||'—'}</h3><div style="display:flex;gap:8px;align-items:center">`;
      if(md.state==='draft') html+=`<button class="bg" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="updateMeetingStatusFromUI(${md.id},'done')">✓ Mark as Done</button>`;
      if(md.state==='done') html+=`<button class="bg" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="updateMeetingStatusFromUI(${md.id},'draft')">↩ Reopen</button>`;
      html+=`<button class="bg" style="color:#fff;border-color:rgba(255,255,255,.3);font-size:10px" onclick="setState({modal:'edit_meeting',emSelAttendees:[...(meetingDetailData.attendeeIds||[])],emSelCompany:meetingDetailData.company?.name||null,emAttQuery:'',emAttOpen:false})">✏ Edit</button>`;
      html+=`${badge(md.state,md.state==='done'?'Done':'Draft')}</div></div>`;
      html+=`<div style="padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">`;
      html+=`<div><div class="sl">Date</div><div style="font-size:12px;font-weight:600;color:#2C3E50">${mdDateFmt}</div></div>`;
      html+=`<div><div class="sl">Type</div><span style="padding:2px 10px;border-radius:4px;background:${mdTypeBg};color:${mdTypeColor};font-size:10px;font-weight:700">${md.type==='weekly'?'Weekly':'Ad-hoc'}</span></div>`;
      html+=`<div><div class="sl">Company</div><div style="font-size:12px;font-weight:600;color:#2C3E50">${md.company?.name||'—'}</div></div>`;

      html+=`<div style="grid-column:1/-1"><div class="sl">Attendees (${md.attendeeCount})</div><div style="font-size:11px;color:#2C3E50;margin-top:4px">${_mdAttNames.length>0?_mdAttNames.join(' · '):'—'}</div></div>`;
      html+=`<div><div class="sl">Created By</div><div style="font-size:12px;font-weight:600;color:#2C3E50">${md.createdBy?.name||'—'}</div></div>`;
      html+=`<div><div class="sl">Action Points</div><div style="font-size:12px;font-weight:600;color:${md.actionCount>0?'#C0714A':'#95A09C'}">${md.actionCount}</div></div>`;
      html+=`</div>`;
      if(md.details){
        html+=`<div style="padding:0 16px 16px"><div class="sl" style="margin-bottom:6px">Notes / Minutes</div><div style="font-size:11px;color:#2C3E50;background:#FAFAF8;border:1px solid #E4E1DC;border-radius:6px;padding:10px;line-height:1.8;white-space:pre-wrap;direction:auto">${md.details.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div></div>`;
      }
      html+=`</div>`;
      // Action Points
      if(md.actions&&md.actions.length>0){
        const actionStatusColors={pending:{bg:'#FDF6EC',c:'#D4960A',b:'#F5DDB8'},in_progress:{bg:'#E8F0FE',c:'#3B5BDB',b:'#C5D3F8'},done:{bg:'#E4EFE6',c:'#2D5A3D',b:'#CDDDD1'},cancelled:{bg:'#FDF0F0',c:'#C94444',b:'#F5C4C4'}};
        html+=`<div class="xc"><div class="xh"><h3>📋 Action Points</h3><div style="display:flex;align-items:center;gap:8px"><span class="ct">${md.actions.length} items · ${md.actions.filter(a=>a.status==='done').length} done</span><button class="bg" style="font-size:9px;padding:3px 10px;color:#fff;border-color:rgba(255,255,255,.3)" onclick="setState({modal:'add_action'})">+ Add</button></div></div>`;
        html+=`<table class="tbl"><thead><tr><th>#</th><th>Action</th><th>Assigned To</th><th>Due Date</th><th>Status</th><th>Update</th></tr></thead><tbody>`;

          const sc=actionStatusColors[a.status]||actionStatusColors.pending;
          const statusLabel={pending:'Pending',in_progress:'In Progress',done:'Done',cancelled:'Cancelled'}[a.status]||a.status;
          const dueFmt=a.dueDate?new Date(a.dueDate+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
          const isOverdue=a.dueDate&&a.status!=='done'&&a.status!=='cancelled'&&new Date(a.dueDate)<new Date();
          html+=`<tr>`;
          html+=`<td class="mn" style="font-size:10px;color:#95A09C">${a.sequence||'—'}</td>`;
          html+=`<td style="font-size:11px;max-width:280px">${a.name}</td>`;
          html+=`<td style="font-size:10px">${a.assignedTo?.name||'—'}</td>`;
          html+=`<td class="mn" style="font-size:10px;color:${isOverdue?'#C94444':'#64706C'}">${dueFmt}${isOverdue?' ⚠':''}  </td>`;
          html+=`<td>${badge(a.status,statusLabel)}</td>`;
          html+=`<td><select data-action-id="${a.id}" class="fsel" style="height:26px;font-size:10px" onchange="updateActionStatus(${a.id},this.value)"><option value="pending" ${a.status==='pending'?'selected':''}>Pending</option><option value="in_progress" ${a.status==='in_progress'?'selected':''}>In Progress</option><option value="done" ${a.status==='done'?'selected':''}>Done</option><option value="cancelled" ${a.status==='cancelled'?'selected':''}>Cancelled</option></select></td>`;
          html+=`</tr>`;

        html+=`</tbody></table></div>`;

        html+=`</div>`;
      } else {

      }

  // ── BULK LEAVE SETTINGS MODAL ──
  if(state.modal==='bulkLeaveSettings'){

      <div style="font-size:11px;color:#2D5A3D;font-weight:600">Accrual Formula: Balance = (months since joining) × (annual days ÷ 12) − days taken</div>

    </div>`;
    html+=`<table class="tbl" style="font-size:10px"><thead><tr><th style="width:180px">Employee</th><th style="width:120px">Joining Date</th><th style="width:100px">Annual Days</th><th style="width:80px">Monthly Rate</th><th style="width:60px">Status</th><th style="width:70px">Action</th></tr></thead><tbody>`;
    fe.forEach(emp=>{
      const hasLS=!!emp._leaveSettings;
      const ls=emp._leaveSettings||{};
      const curJoining=ls.joiningDate||emp.hireDate||'';

      const curAnnual=hasLS?parseFloat(ls.annualLeaveDays):21;
      const mRate=(curAnnual/12).toFixed(2);
      html+=`<tr id="blk_row_${emp.id}">`;
      html+=`<td style="display:flex;align-items:center;gap:6px">${avatar(emp,20,false)}<span style="font-size:10px">${emp.name}</span></td>`;
      html+=`<td><input type="date" id="blk_join_${emp.id}" value="${joiningVal}" style="font-size:10px;padding:3px 6px;border:1px solid #E4E1DC;border-radius:4px;font-family:'JetBrains Mono',monospace;width:100%"/></td>`;
      html+=`<td><input type="number" id="blk_annual_${emp.id}" value="${curAnnual}" step="0.5" min="0" max="365" style="font-size:10px;padding:3px 6px;border:1px solid #E4E1DC;border-radius:4px;font-family:'JetBrains Mono',monospace;width:70px" oninput="document.getElementById('blk_rate_${emp.id}').textContent=(this.value/12).toFixed(2)"/></td>`;
      html+=`<td class="mn" style="font-size:10px" id="blk_rate_${emp.id}">${mRate}</td>`;
      html+=`<td><span style="font-size:8px;padding:2px 6px;border-radius:4px;background:${hasLS?'#E4EFE6':'#FFF3E0'};color:${hasLS?'#2D5A3D':'#C0714A'}">${hasLS?'Set':'Default'}</span></td>`;
      html+=`<td><button class="bg" style="font-size:9px;padding:3px 8px" onclick="saveSingleLeaveSettings(${emp.id},'${emp.name.replace(/'/g,"\\'")}')">✔ Save</button></td>`;
      html+=`</tr>`;
    });
    html+=`</tbody></table>`;
    html+=`</div>`;
    html+=`<div class="modal-footer"><button class="bg" onclick="setState({modal:null})">Close</button><button class="bp" onclick="saveAllLeaveSettings()">Save All</button></div>`;
    html+=`</div></div>`;
  }

  // ── MODALS ──
  if(state.modal && state.modal!=='bulkLeaveSettings'){

// ─── EXPORT FUNCTIONS ──────────────────────────────────────────────────────
function getIncExportRows(c) {
  const rows = [];
  const cats = {};
  c.lines.forEach(l => { if(!cats[l.cat]) cats[l.cat]=[]; cats[l.cat].push(l); });
  Object.keys(cats).forEach(cat => {
    cats[cat].forEach(l => {
      rows.push({
        'Calculation': c.name,
        'Period': c.month + ' ' + c.year,
        'Category': catLabels[cat] || cat,
        'Employee': l.emp,
        'Orders': l.orders,
        'Tons': l.tons,
        'Rate/Ton': l.rate,
        'Base Inc': l.inc,
        'Quality Adj': l.adj,
        'Containers': l.cont || 0,
        'Container Inc': l.contI || 0,
        'Target Bonus': l.tgtB || 0,
        'Meeting Ded.': l.meetD || 0,
        'Bonus': l.bon || 0,
        'Fine': l.fin || 0,
        'Final Payout': l.final,
        'Currency': getCurrency()
      });
    });
  });
  return rows;
}

function exportIncCSV() {
  const c = state.selCalc;
  if(!c || !c.lines.length) { showToast('No incentive lines to export.','error'); return; }
  const rows = getIncExportRows(c);
  const headers = Object.keys(rows[0]);
  const csv = [headers.join(','), ...rows.map(r => headers.map(h => JSON.stringify(r[h]??'')).join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = c.name + '_incentive.csv';
  a.click();
}

function exportIncExcel() {
  const c = state.selCalc;
  if(!c || !c.lines.length) { showToast('No incentive lines to export.','error'); return; }
  const rows = getIncExportRows(c);
  const headers = Object.keys(rows[0]);
  // Build HTML table that Excel can open
  let tbl = '<table><tr>' + headers.map(h=>`<th>${h}</th>`).join('') + '</tr>';
  rows.forEach(r => { tbl += '<tr>' + headers.map(h=>`<td>${r[h]??''}</td>`).join('') + '</tr>'; });
  tbl += '</table>';
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body>${tbl}</body></html>`;
  const blob = new Blob([html], {type:'application/vnd.ms-excel'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = c.name + '_incentive.xls';
  a.click();
}

      td{padding:4px 8px;border-bottom:1px solid #E4E1DC;font-size:9px}
      tr:nth-child(even) td{background:#F9F8F6}
      .total-row td{font-weight:700;background:#E4EFE6;color:#2D5A3D}
      .footer{margin-top:16px;font-size:8px;color:#B0BAB6;text-align:right}
      @media print{body{margin:10px}}
    </style></head><body>
    <h1>Production Incentive Report — ${c.name}</h1>
    <h2>${c.month} ${c.year} &nbsp;|&nbsp; ${c.state.charAt(0).toUpperCase()+c.state.slice(1)} &nbsp;|&nbsp; FM: ${c.fm}</h2>
    <div>
      <div class="kpi"><div class="kpi-label">Produced</div><div class="kpi-val">${c.totalTons.toLocaleString()}t</div></div>
      <div class="kpi"><div class="kpi-label">Quality Ratio</div><div class="kpi-val">${(c.qr*100).toFixed(1)}%</div></div>
      <div class="kpi"><div class="kpi-label">Containers</div><div class="kpi-val">${c.containers}</div></div>
      <div class="kpi"><div class="kpi-label">Total Payout</div><div class="kpi-val">${totalPayout.toLocaleString()} ${cur}</div></div>
    </div>
    <table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach(r => {
    body += '<tr>' + headers.map(h=>`<td>${r[h]??''}</td>`).join('') + '</tr>';
  });
  body += `<tr class="total-row"><td colspan="12">GRAND TOTAL</td><td colspan="5" style="text-align:right">${totalPayout.toLocaleString()} ${cur}</td></tr>`;
  body += `</tbody></table><div class="footer">Generated ${new Date().toLocaleString()} &nbsp;|&nbsp; Platfarm HR System</div></body></html>`;
  printWin.document.write(body);
  printWin.document.close();
  printWin.focus();
  setTimeout(() => printWin.print(), 500);
}

// Listen for navigation messages from parent frame (HRHome.tsx sidebar)
window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'hr-navigate' && event.data.page) {
    setState({ page: event.data.page, selEmp: null });
  }
  // Open employee profile by ID (from Employee Listing page)
  if (event.data && event.data.type === 'hr-open-profile' && event.data.employeeId) {
    if (emps.length > 0) {
      const emp = emps.find(x => x.id === event.data.employeeId);
      if (emp) {
        setState({ selEmp: emp, empTab: event.data.tab || 'overview', page: 'profile' });
      }
    } else {
      // Data not loaded yet — queue it for after loadData completes
      _pendingProfileOpen = { employeeId: event.data.employeeId, tab: event.data.tab || 'overview' };
    }
  }
});

// Load data from Odoo API, then render
loadData();
</script>
<input type="file" id="doc-file-input" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx,.txt" style="display:none" onchange="handleDocFileSelect(this)">
<input type="file" id="photo-file-input" accept="image/*" style="display:none" onchange="handlePhotoFileSelect(this)">
<input type="file" id="wiz-photo-input" accept="image/*" style="display:none" onchange="handleWizPhotoSelect(this)">
</body>
