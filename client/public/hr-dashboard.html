<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Management — Platfarm</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F7F6F3;color:#2C3E50;overflow-x:hidden}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CDDDD1;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#4A7C59}

/* ── KPI Card ── */
.sc{background:#fff;border:1px solid #CDDDD1;border-radius:9px;padding:14px;transition:border-color .15s}
.sc:hover{border-color:#4A7C59}
.sl{font-size:9px;font-weight:700;text-transform:uppercase;color:#4A7C59;letter-spacing:.5px;margin-bottom:4px}
.sv{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:#2D5A3D}
.ss{font-size:10px;color:#95A09C;margin-top:2px}

/* ── Section Card ── */
.xc{background:#fff;border:1px solid #E4E1DC;border-radius:9px;overflow:hidden;margin-bottom:14px}
.xh{background:#2D5A3D;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.xh h3{font-size:12px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.ct{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:rgba(255,255,255,.7)}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;font-weight:700;text-transform:uppercase;color:#4A7C59;letter-spacing:.5px;padding:8px 10px;text-align:left;border-bottom:1px solid #E4E1DC}
.tbl td{font-size:11px;color:#2C3E50;padding:8px 10px;border-bottom:1px solid #F2F0EC;vertical-align:middle}
.tbl tr:hover td{background:#FAFAF8}
.mn{font-family:'JetBrains Mono',monospace;font-weight:600}

/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid #E4E1DC;background:#fff;padding:0 16px;overflow-x:auto}
.tab{padding:10px 16px;font-size:11px;font-weight:500;color:#64706C;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:#2D5A3D}.tab.act{color:#2D5A3D;font-weight:600;border-bottom-color:#2D5A3D}

/* ── Buttons ── */
.bp{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:#2D5A3D;color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all .25s}
.bp:hover{background:#3A7350}
.bs{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:#C0714A;color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all .25s}
.bs:hover{background:#A8613F}
.bg{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:transparent;color:#64706C;border:1px solid #E4E1DC;border-radius:6px;font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;transition:all .15s}
.bg:hover{border-color:#4A7C59;color:#2D5A3D}

/* ── Info Panel ── */
.ip{background:#fff;border:1px solid #E4E1DC;border-radius:9px;padding:16px}
.ip h4{font-size:12px;font-weight:700;color:#2C3E50;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #F2F0EC;display:flex;justify-content:space-between;align-items:center}
.ir{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #FAFAF8}
.ir:last-child{border-bottom:none}
.il{font-size:10px;color:#64706C}.iv{font-size:11px;font-weight:600;color:#2C3E50;text-align:right}

/* ── Employee Card ── */
.ec{background:#fff;border:1px solid #E4E1DC;border-radius:9px;padding:14px;cursor:pointer;transition:all .25s cubic-bezier(.25,.46,.45,.94);display:flex;gap:12px;align-items:flex-start}
.ec:hover{border-color:#4A7C59;box-shadow:0 6px 20px rgba(27,58,45,.06);transform:translateY(-2px)}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.3px;white-space:nowrap}

/* ── Company Switcher (matches Shipments module) ── */
.co-btn{padding:3px 8px;border-radius:4px;border:1px solid #CDDDD1;background:#F2F7F3;font-size:10px;font-weight:600;color:#2D5A3D;cursor:pointer;font-family:inherit;position:relative;white-space:nowrap}
.co-btn:hover,.co-btn.open{background:#E4EFE6;border-color:#4A7C59}
.co-dd{position:absolute;top:calc(100% + 4px);right:0;min-width:280px;background:#fff;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);border:1px solid #E4E1DC;overflow:hidden;z-index:200;animation:ddIn .2s cubic-bezier(.16,1,.3,1) both}
@keyframes ddIn{0%{opacity:0;transform:translateY(-4px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}
.co-dd-header{padding:8px 12px;border-bottom:1px solid #E4E1DC;background:#F2F7F3}
.co-dd-header span{font-size:9px;font-weight:700;color:#4A7C59;text-transform:uppercase;letter-spacing:.8px}
.co-item{padding:8px 12px;font-size:11.5px;color:#2C3E50;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px;border-bottom:1px solid #E4E1DC}
.co-item:last-child{border-bottom:none}
.co-item:hover{background:#F2F7F3}
.co-item.act{background:#E4EFE6}
.co-badge{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.co-item-info{flex:1;min-width:0}
.co-item-name{font-size:11.5px;font-weight:600;color:#2C3E50;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.co-item-sub{font-size:9px;color:#B0BAB6}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;animation:modalBgIn .2s ease both}
@keyframes modalBgIn{0%{opacity:0}100%{opacity:1}}
.modal-card{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.22);width:560px;max-height:85vh;overflow-y:auto;animation:modalIn .25s cubic-bezier(.16,1,.3,1) both}
@keyframes modalIn{0%{opacity:0;transform:scale(.95) translateY(8px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:16px 20px;border-bottom:1px solid #E4E1DC;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:700;color:#2C3E50}
.modal-body{padding:18px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid #E4E1DC;display:flex;justify-content:flex-end;gap:8px}
.modal-spinner{width:30px;height:30px;border:3px solid #CDDDD1;border-top-color:#2D5A3D;border-radius:50%;animation:spin .7s linear infinite}
.modal-success-icon{width:60px;height:60px;background:#E4EFE6;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:popIn .35s cubic-bezier(.16,1,.3,1)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.modal-close{background:none;border:none;font-size:18px;color:#95A09C;cursor:pointer;padding:4px;line-height:1}
.modal-close:hover{color:#C94444}

/* ── Profile Header ── */
.prof-header{padding:20px 24px;background:linear-gradient(135deg,#2D5A3D,#4A7C59);color:#fff;display:flex;gap:20px;align-items:center}
.prof-stats{display:flex;gap:16px;margin-top:10px}
.prof-stat{text-align:center}
.prof-stat-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700}
.prof-stat-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.5px;opacity:.6;margin-top:2px}

/* ── Document Item ── */
.doc-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#FAFAF8;border:1px solid #E4E1DC;border-radius:8px;margin-bottom:6px;transition:border-color .15s}
.doc-item:hover{border-color:#4A7C59}

/* ── View Toggle ── */
.vtog{display:flex;border:1px solid #E4E1DC;border-radius:7px;overflow:hidden}
.vtog-btn{padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:inherit;background:#fff;color:#64706C}
.vtog-btn.act{background:#2D5A3D;color:#fff}
.vtog-btn:not(.act):hover{background:#F2F7F3}

/* ── Activity Item ── */
.act-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #F2F0EC;align-items:flex-start;transition:background .1s}
.act-item:last-child{border-bottom:none}
.act-item:hover{background:#FAFAF8;margin:0 -10px;padding:8px 10px;border-radius:6px}
.act-dot{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* ── Wizard ── */
.wiz-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;animation:modalBgIn .2s ease both}
.wiz-card{background:#fff;border-radius:14px;box-shadow:0 24px 80px rgba(0,0,0,.25);width:720px;max-height:90vh;display:flex;flex-direction:column;animation:modalIn .3s cubic-bezier(.16,1,.3,1) both;overflow:hidden}
.wiz-header{padding:18px 22px;border-bottom:1px solid #E4E1DC;display:flex;align-items:center;justify-content:space-between}
.wiz-header h2{font-size:16px;font-weight:700;color:#2C3E50}
.wiz-steps{display:flex;align-items:center;padding:16px 22px;background:#FAFAF8;border-bottom:1px solid #E4E1DC;gap:0}
.wiz-step{display:flex;align-items:center;flex:1}
.wiz-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .3s cubic-bezier(.16,1,.3,1)}
.wiz-dot.done{background:#2D5A3D;color:#fff}
.wiz-dot.active{background:#C0714A;color:#fff;box-shadow:0 0 0 4px rgba(192,113,74,.2)}
.wiz-dot.future{background:#E4E1DC;color:#95A09C}
.wiz-line{flex:1;height:2px;margin:0 6px}
.wiz-line.done{background:#2D5A3D}
.wiz-line.future{background:#E4E1DC}
.wiz-step-label{font-size:8px;color:#64706C;text-align:center;margin-top:3px;white-space:nowrap}
.wiz-body{flex:1;overflow-y:auto;padding:20px 22px}
.wiz-footer{padding:14px 22px;border-top:1px solid #E4E1DC;display:flex;justify-content:space-between;align-items:center;background:#FAFAF8}
.wiz-section{margin-bottom:18px}
.wiz-section-title{font-size:11px;font-weight:700;color:#2D5A3D;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #E4E1DC;display:flex;align-items:center;gap:8px}
.wiz-photo-upload{width:100px;height:100px;border-radius:50%;border:3px dashed #CDDDD1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:#FAFAF8}
.wiz-photo-upload:hover{border-color:#4A7C59;background:#F2F7F3}
.wiz-review-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F2F0EC;font-size:11px}
.wiz-review-row:last-child{border-bottom:none}
.wiz-review-label{color:#64706C}
.wiz-review-value{font-weight:600;color:#2C3E50;text-align:right}
.wiz-progress{height:4px;background:#E4E1DC;position:relative;overflow:hidden}
.wiz-progress-fill{height:100%;background:linear-gradient(90deg,#2D5A3D,#4A7C59);transition:width .5s cubic-bezier(.16,1,.3,1);border-radius:0 2px 2px 0}
@keyframes successPop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes successRing{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.wiz-success{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;text-align:center}
.wiz-success-check{width:72px;height:72px;border-radius:50%;background:#2D5A3D;color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;animation:successPop .5s cubic-bezier(.16,1,.3,1) both;box-shadow:0 0 0 0 rgba(45,90,61,.3);margin-bottom:16px}
.wiz-success-ring{position:absolute;width:90px;height:90px;border-radius:50%;border:3px solid rgba(45,90,61,.15);animation:successRing .6s cubic-bezier(.16,1,.3,1) .2s both}

/* ── Form Input ── */
.fi{margin-bottom:12px}
.fi label{display:block;font-size:9px;font-weight:600;color:#64706C;letter-spacing:.3px;text-transform:uppercase;margin-bottom:5px}
.fi input,.fi select{width:100%;height:36px;padding:0 12px;border:1.5px solid rgba(27,58,45,.12);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;color:#2C3E50;outline:none;background:#fff}
.fi input:focus,.fi select:focus{border-color:#4A7C59}
.fi textarea{width:100%;height:72px;padding:8px 12px;border:1.5px solid rgba(27,58,45,.12);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;color:#2C3E50;resize:vertical;outline:none;background:#fff}
.fi textarea:focus{border-color:#4A7C59}
.fi input[type="date"]{font-family:'JetBrains Mono',monospace}
.fi input:disabled,.fi select:disabled,.fi textarea:disabled{background:#FAFAF8}

/* ── Filter Select ── */
.fsel{height:30px;padding:0 10px;border:1px solid #E4E1DC;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;color:#2C3E50;background:#fff;outline:none;cursor:pointer;transition:border-color .15s}
.fsel:focus,.fsel:hover{border-color:#4A7C59}
/* ── Upload Box ── */
.upload-box{border:2px dashed #CDDDD1;border-radius:8px;padding:14px;text-align:center;background:#FAFAF8;cursor:pointer;margin-bottom:12px}
.upload-box:hover{border-color:#4A7C59}

/* ── Page Header ── */
.ph{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #E4E1DC;background:#fff;position:sticky;top:0;z-index:40}
.pt{font-size:14px;font-weight:700;color:#2C3E50;display:flex;align-items:center;gap:8px}
.rb{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:600;background:#E4EFE6;color:#2D5A3D}

/* ── Avatar ── */
.av{border-radius:50%;flex-shrink:0;position:relative;display:inline-flex}
.av img{border-radius:50%;object-fit:cover;display:block}
.av .fb{border-radius:50%;display:none;align-items:center;justify-content:center;font-weight:700;color:#fff;position:absolute;inset:0}
.av .online-dot{position:absolute;bottom:0;right:0;border-radius:50%;border:2px solid #fff}

/* ── Page Content ── */
.page-content{padding:18px;min-height:calc(100vh - 44px)}

/* ── Incentive Stage Bar ── */
.stg{display:flex;align-items:center;gap:0}
.stg-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .3s}
.stg-line{width:40px;height:2px;transition:background .3s}
.stg-label{font-size:8px;margin-top:2px;text-align:center}

/* ── Category Accordion ── */
.cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;border-bottom:1px solid #F2F0EC;transition:background .1s}
.cat-hdr:hover{background:#FAFAF8}

/* ── Calc Progress ── */
.calc-spinner{width:40px;height:40px;border:3px solid #E4E1DC;border-top-color:#2D5A3D;border-radius:50%;animation:spin 1s linear infinite}
.calc-bar{height:6px;background:#E4E1DC;border-radius:3px;overflow:hidden;margin-bottom:8px}
.calc-bar-fill{height:100%;background:linear-gradient(90deg,#2D5A3D,#4A7C59);border-radius:3px;transition:width .4s cubic-bezier(.16,1,.3,1)}
.calc-step{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:11px;color:#95A09C;transition:color .2s}
.calc-step.done{color:#2D5A3D}
.calc-step.active{color:#C0714A;font-weight:600}
.calc-step-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all .3s;flex-shrink:0}
@keyframes calcPulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<!-- Canonical redirect removed: dashboard is always served via /api/* inside an iframe; the React shell handles canonical domain enforcement -->
<div id="app">
<div style="display:flex;height:100vh;background:#F8F6F2;font-family:'Inter',system-ui,sans-serif;overflow:hidden">
  <!-- Skeleton Sidebar -->
  <div style="width:220px;background:#fff;border-right:1px solid #E4E1DC;padding:20px 16px;flex-shrink:0">
    <div style="width:100px;height:14px;background:#E8E5E0;border-radius:4px;margin-bottom:24px;animation:shimmer 1.5s ease-in-out infinite"></div>
    <div style="width:60px;height:8px;background:#EDEBE7;border-radius:3px;margin-bottom:16px"></div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <div style="height:36px;background:#F2F7F3;border-radius:6px;animation:shimmer 1.5s ease-in-out infinite"></div>
      <div style="height:36px;background:#F5F3EF;border-radius:6px;animation:shimmer 1.5s ease-in-out infinite;animation-delay:.1s"></div>
      <div style="height:36px;background:#F5F3EF;border-radius:6px;animation:shimmer 1.5s ease-in-out infinite;animation-delay:.2s"></div>
      <div style="height:36px;background:#F5F3EF;border-radius:6px;animation:shimmer 1.5s ease-in-out infinite;animation-delay:.3s"></div>
      <div style="height:36px;background:#F5F3EF;border-radius:6px;animation:shimmer 1.5s ease-in-out infinite;animation-delay:.4s"></div>
    </div>
  </div>
  <!-- Skeleton Main Content -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <!-- Skeleton Top Bar -->
    <div style="height:52px;background:#fff;border-bottom:1px solid #E4E1DC;display:flex;align-items:center;padding:0 24px;gap:16px">
      <div style="width:140px;height:14px;background:#E8E5E0;border-radius:4px;animation:shimmer 1.5s ease-in-out infinite"></div>
      <div style="flex:1"></div>
      <div style="width:200px;height:28px;background:#F5F3EF;border-radius:6px;animation:shimmer 1.5s ease-in-out infinite;animation-delay:.15s"></div>
      <div style="width:80px;height:12px;background:#EDEBE7;border-radius:3px;animation:shimmer 1.5s ease-in-out infinite;animation-delay:.25s"></div>
    </div>
    <!-- Skeleton Content -->
    <div style="flex:1;padding:24px;overflow:hidden">
      <!-- KPI Cards Row -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
        <div style="height:88px;background:#fff;border-radius:10px;border:1px solid #E4E1DC;padding:16px;animation:shimmer 1.5s ease-in-out infinite">
          <div style="width:60%;height:10px;background:#EDEBE7;border-radius:3px;margin-bottom:12px"></div>
          <div style="width:40%;height:22px;background:#E8E5E0;border-radius:4px"></div>
        </div>
        <div style="height:88px;background:#fff;border-radius:10px;border:1px solid #E4E1DC;padding:16px;animation:shimmer 1.5s ease-in-out infinite;animation-delay:.1s">
          <div style="width:55%;height:10px;background:#EDEBE7;border-radius:3px;margin-bottom:12px"></div>
          <div style="width:35%;height:22px;background:#E8E5E0;border-radius:4px"></div>
        </div>
        <div style="height:88px;background:#fff;border-radius:10px;border:1px solid #E4E1DC;padding:16px;animation:shimmer 1.5s ease-in-out infinite;animation-delay:.2s">
          <div style="width:65%;height:10px;background:#EDEBE7;border-radius:3px;margin-bottom:12px"></div>
          <div style="width:30%;height:22px;background:#E8E5E0;border-radius:4px"></div>
        </div>
        <div style="height:88px;background:#fff;border-radius:10px;border:1px solid #E4E1DC;padding:16px;animation:shimmer 1.5s ease-in-out infinite;animation-delay:.3s">
          <div style="width:50%;height:10px;background:#EDEBE7;border-radius:3px;margin-bottom:12px"></div>
          <div style="width:45%;height:22px;background:#E8E5E0;border-radius:4px"></div>
        </div>
      </div>
      <!-- Main Cards Row -->
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px">
        <div style="background:#fff;border-radius:10px;border:1px solid #E4E1DC;padding:20px;min-height:200px;animation:shimmer 1.5s ease-in-out infinite;animation-delay:.15s">
          <div style="width:120px;height:12px;background:#E8E5E0;border-radius:4px;margin-bottom:20px"></div>
          <div style="display:flex;flex-direction:column;gap:12px">

// Use parent window origin for API calls since this page is loaded inside an iframe
let API_BASE = window.location.origin;
try { if (window.parent !== window) API_BASE = window.parent.location.origin; } catch(e) { /* cross-origin: use own origin */ }
async function trpcQuery(path, input, timeoutMs = 20000) {
  const params = input !== undefined ? `&input=${encodeURIComponent(JSON.stringify({"0":{"json":input}}))}` : `&input=${encodeURIComponent(JSON.stringify({"0":{"json":{}}}))}` ;
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(`${API_BASE}/api/trpc/${path}?batch=1${params}`, {credentials:'include', signal: ctrl.signal});
    const json = await res.json();
    clearTimeout(timer);
    if (json[0]?.error) { console.error(`tRPC error [${path}]:`, json[0].error); return null; }
    return json[0]?.result?.data?.json;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') { console.warn('[tRPC] Timeout:', path); return null; }
    throw e;
  }
}
async function trpcMutate(path, input) {
  const res = await fetch(`${API_BASE}/api/trpc/${path}?batch=1`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({"0":{"json":input}}),
    credentials: 'include'
  });
  const json = await res.json();
  if (json[0]?.error) {
    const msg = json[0].error?.data?.message || json[0].error?.message || JSON.stringify(json[0].error);
    console.error(`tRPC mutation error [${path}]:`, json[0].error);
    throw new Error(msg);
  }
  return json[0]?.result?.data?.json;
}

const avatarColors = ['#2D5A3D','#4A7C59','#7A9E7E','#C0714A','#D4960A','#6B8E7B','#3A7350','#8B6E5A','#5B7065','#A0522D'];
function hashColor(name) { let h=0; for(let i=0;i<name.length;i++) h=name.charCodeAt(i)+((h<<5)-h); return avatarColors[Math.abs(h)%avatarColors.length]; }
function getInitials(name) { const parts=name.trim().split(/\s+/); return parts.length>=2 ? (parts[0][0]+parts[parts.length-1][0]).toUpperCase() : name.substring(0,2).toUpperCase(); }
function avatarSrc(base64) { if(!base64) return ''; try { const decoded=atob(base64); if(decoded.startsWith('<?xml')||decoded.startsWith('<svg')) return 'data:image/svg+xml;base64,'+base64; return 'data:image/png;base64,'+base64; } catch(e) { return ''; } }

function downloadBulkTemplate(type){
  const BULK_TYPES={
    payslip:{cols:['Employee ID','Employee Name','Period From (YYYY-MM-DD)','Period To (YYYY-MM-DD)','Basic Wage','Housing Allowance','Transport Allowance','Other Allowance','Deductions','Net Pay','Notes']},
    fine:{cols:['Employee ID','Employee Name','Date (YYYY-MM-DD)','Reason','Penalty Days','Daily Rate','Amount','Payroll Month','Notes']},
    bonus:{cols:['Employee ID','Employee Name','Date (YYYY-MM-DD)','Reason','Bonus Days','Daily Rate','Amount','Payroll Month','Notes']},
    leave:{cols:['Employee ID','Employee Name','Leave Type','From (YYYY-MM-DD)','To (YYYY-MM-DD)','Days','Notes']},
  };
  const def=BULK_TYPES[type];
  if(!def) return;
  const cols=def.cols;
  const rows=[cols];
  // Pre-fill with all employees
  emps.forEach(e=>{
    const row=cols.map((_,i)=>{
      if(i===0) return e.id;
      if(i===1) return e.name;
      return '';
    });
    rows.push(row);
  });
  const csv=rows.map(r=>r.map(v=>{
    const s=String(v===null||v===undefined?'':v);
    return s.includes(',')|| s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`platfarm_${type}_template_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function parseBulkCSV(file, type){
  if(!file) return;
  const BULK_TYPES={
    payslip:{cols:['Employee ID','Employee Name','Period From (YYYY-MM-DD)','Period To (YYYY-MM-DD)','Basic Wage','Housing Allowance','Transport Allowance','Other Allowance','Deductions','Net Pay','Notes'],required:[0,1,2,3,4]},
    fine:{cols:['Employee ID','Employee Name','Date (YYYY-MM-DD)','Reason','Penalty Days','Daily Rate','Amount','Payroll Month','Notes'],required:[0,1,2,3,6]},
    bonus:{cols:['Employee ID','Employee Name','Date (YYYY-MM-DD)','Reason','Bonus Days','Daily Rate','Amount','Payroll Month','Notes'],required:[0,1,2,3,6]},
    leave:{cols:['Employee ID','Employee Name','Leave Type','From (YYYY-MM-DD)','To (YYYY-MM-DD)','Days','Notes'],required:[0,1,2,3,4]},
  };
  const def=BULK_TYPES[type];
  const reader=new FileReader();
  reader.onload=function(ev){
    const text=ev.target.result;
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){setState({bulkRows:[],bulkErrors:[{row:-1,msg:'File is empty or has no data rows'}],bulkFileName:file.name});return;}
    // Parse CSV (simple, handles quoted fields)
    function parseCSVLine(line){
      const result=[];let cur='';let inQ=false;
      for(let i=0;i<line.length;i++){
        const c=line[i];
        if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
        else if(c===','&&!inQ){result.push(cur.trim());cur='';}
        else cur+=c;
      }
      result.push(cur.trim());
      return result;
    }
    const header=parseCSVLine(lines[0]);
    const dataRows=lines.slice(1).map(l=>parseCSVLine(l));
    const errors=[];
    dataRows.forEach((row,i)=>{
      if(def.required){
        def.required.forEach(ci=>{
          if(!row[ci]||row[ci].trim()==='') errors.push({row:i,msg:`Column "${def.cols[ci]}" is required`});
        });
      }
      // Validate date fields
      [2,3,4].forEach(ci=>{
        if(def.cols[ci]&&def.cols[ci].includes('YYYY-MM-DD')&&row[ci]&&row[ci].trim()){
          const d=new Date(row[ci]);
          if(isNaN(d.getTime())) errors.push({row:i,msg:`Invalid date in "${def.cols[ci]}": ${row[ci]}`});
        }
      });
      // Validate numeric fields
      [4,5,6].forEach(ci=>{
        if(def.cols[ci]&&(def.cols[ci].includes('Wage')||def.cols[ci].includes('Allowance')||def.cols[ci].includes('Amount')||def.cols[ci].includes('Rate')||def.cols[ci].includes('Days')||def.cols[ci].includes('Pay')||def.cols[ci].includes('Deductions'))&&row[ci]&&row[ci].trim()){
          if(isNaN(parseFloat(row[ci]))) errors.push({row:i,msg:`"${def.cols[ci]}" must be a number`});
        }
      });
    });
    setState({bulkRows:dataRows,bulkErrors:errors,bulkFileName:file.name});
  };
  reader.readAsText(file);
}

function confirmBulkUpload(){

  toast.textContent=`✓ ${validCount} records imported successfully`;

}

async function loadData() {
  try {
    // ── PHASE 1: Critical data (employees + stats + contracts) ──────────────
    // Load only what's needed to render the dashboard immediately
    const [rawEmps, stats, contracts, accessDataResult] = await Promise.all([
      trpcQuery('hr.employees').catch(() => null),
      trpcQuery('hr.dashboardStats').catch(() => null),
      trpcQuery('hr.contracts').catch(() => null),
      trpcQuery('userMgmt.myCompanyAccess').catch(() => null),
    ]);

    // Map employees immediately so we can render
    if (rawEmps) {
      emps = rawEmps.map(mapEmployee);
      const ALL_ODOO_COMPANIES = [
        { odooId: 2, name: 'ABU DHABI-PLATFARM FOR AGRITECH AND AGRIBUSINESS LTD', abbr: 'AB', currency: 'AED', country: 'United Arab Emirates' },
        { odooId: 1, name: 'ADGM-PLATFARM FOR AGRITECH AND AGRIBUSINESS LTD', abbr: 'AD', currency: 'AED', country: 'United Arab Emirates' },
        { odooId: 5, name: 'Cairo-AlfaGlobal Agribusiness (The Platform for Smart Solutions)', abbr: 'CA', currency: 'EGP', country: 'Egypt' },
        { odooId: 3, name: 'Cairo-PLATFARM FOR AGRICULTURE CONSULTANCY', abbr: 'CA', currency: 'EGP', country: 'Egypt' },
        { odooId: 4, name: 'Sokhna-PLATFARM FOR AGRIBUSINESS', abbr: 'SO', currency: 'EGP', country: 'Egypt' },
      ];
      try {
        const accessData = accessDataResult;
        if (accessData) {
          _hrIsCompanyAdmin = accessData.isAdmin || (accessData.allowedCompanyIds && accessData.allowedCompanyIds.length === 0);
          _hrAllowedOdooIds = accessData.allowedCompanyIds || [];
          _hrDefaultCompanyId = accessData.defaultCompanyId || null;
        }
      } catch(e) { console.error('Failed to fetch company access:', e); _hrIsCompanyAdmin = false; }
      const knownNames = new Set(ALL_ODOO_COMPANIES.map(c => c.name));
      const extraCompanies = emps.map(e => e.company).filter(c => c !== '—' && !knownNames.has(c));
      const extraObjs = [...new Set(extraCompanies)].map(name => ({ name, abbr: name.substring(0,2).toUpperCase(), currency: '', country: '' }));
      let allCompanyObjs = [...ALL_ODOO_COMPANIES, ...extraObjs].sort((a,b) => a.name.localeCompare(b.name));
      if (!_hrIsCompanyAdmin && _hrAllowedOdooIds.length > 0) {
        allCompanyObjs = allCompanyObjs.filter(c => c.odooId && _hrAllowedOdooIds.includes(c.odooId));
      }
      companyObjects = allCompanyObjs;
      companies = _hrIsCompanyAdmin ? ['All Companies', ...companyObjects.map(c => c.name)] : companyObjects.map(c => c.name);
    }
    if (stats) { dashboardStats = stats; leaveTypes = stats.leaveTypes || []; }
    if (contracts && contracts.length > 0) {
      odooContracts = contracts;
      // Group contracts by employee, prefer 'open' (Running) state
      const contractByEmp = new Map();
      contracts.forEach(c => {
        const empId = c.employee?.id;
        if (!empId) return;
        const existing = contractByEmp.get(empId);
        // Prefer open > draft > any other state
        const rank = (s) => s === 'open' ? 2 : s === 'draft' ? 1 : 0;
        if (!existing || rank(c.state) > rank(existing.state)) contractByEmp.set(empId, c);
      });
      contractByEmp.forEach((c, empId) => {
        const emp = emps.find(e => e.id === empId);
        if (emp) {
          emp.wage = c.wage || 0;
          emp.contractType = c.structureType?.name || emp.contractType;
          emp.contractEnd = c.dateEnd || '—';
          emp.contractState = c.state || 'open';
          emp.schedule = c.workSchedule?.name || emp.schedule;
          emp._contract = c;
          if (c.dateStart) {
            emp.hireDate = new Date(c.dateStart).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
            emp._contractDateStart = c.dateStart;
          }
          const isUAE = emp.company && (emp.company.includes('ADGM') || emp.company.includes('ABU DHABI'));
          if (isUAE) { emp.housing = c.aeHousingAllowance || 0; emp.transport = c.aeTransportAllowance || 0; emp.other = c.aeOtherAllowances || 0; }
          else { emp.housing = c.egHousingAllowance || 0; emp.transport = c.egTransportAllowance || 0; emp.other = c.egOtherAllowances || 0; }
          emp.socialIns = c.socialInsurance || 0;
        }
      });
    }

    // ── Render immediately after phase 1 ────────────────────────────────────
    dataLoaded = true;
    if (!_hrIsCompanyAdmin && companyObjects.length > 0) {
      if (_hrDefaultCompanyId !== null) {
        const defaultCo = companyObjects.find(c => c.odooId === _hrDefaultCompanyId);
        if (defaultCo) { setState({company: defaultCo.name}); }
        else { render(); }
      } else if (state.company === 'All Companies' || !companyObjects.some(c => c.name === state.company)) {
        setState({company: companyObjects[0].name});
      } else { render(); }
    } else { render(); }
    if (_pendingProfileOpen && emps.length > 0) {
      const pending = _pendingProfileOpen;
      _pendingProfileOpen = null;
      const emp = emps.find(x => x.id === pending.employeeId);
      if (emp) setState({ selEmp: emp, empTab: pending.tab || 'overview', page: 'profile' });
    }

    // ── PHASE 2: Secondary data in background (non-blocking) ─────────────────
    // Load leave settings first (affects leave balance display)
    // Load bonus/fine types from Odoo (needed for the log bonus/fine form)
    trpcQuery('hr.bonusFineTypes').then(types => {
      if (types && types.length > 0) bfTypes = types;
    }).catch(e => console.warn('Failed to load bonusFineTypes:', e));

    trpcQuery('hr.getAllLeaveSettings').then(lsData => {
      if (lsData && lsData.length > 0) {
        leaveSettingsMap = {};
        lsData.forEach(ls => { leaveSettingsMap[ls.odooEmployeeId] = ls; });
        emps.forEach(emp => {
          const ls = leaveSettingsMap[emp.id];
          if (ls) {
            const annualDays = parseFloat(ls.annualLeaveDays) || 21;
            const joiningDate = ls.joiningDate;
            const today = new Date();
            const joining = new Date(joiningDate);
            let monthsWorked = (today.getFullYear() - joining.getFullYear()) * 12 + (today.getMonth() - joining.getMonth());
            const dayDiff = today.getDate() - joining.getDate();
            if (dayDiff > 0) monthsWorked += dayDiff / 30;
            else if (dayDiff < 0) monthsWorked -= 1 - (30 + dayDiff) / 30;
            monthsWorked = Math.max(0, monthsWorked);
            const monthlyRate = annualDays / 12;
            const accruedDays = Math.round(monthsWorked * monthlyRate * 100) / 100;
            const usedDays = emp.leavesUsed;
            const remaining = Math.round((accruedDays - usedDays) * 100) / 100;
            emp._leaveSettings = ls; emp._accrued = accruedDays;
            emp._monthlyRate = Math.round(monthlyRate * 100) / 100;
            emp._monthsWorked = Math.round(monthsWorked * 100) / 100;
            emp._joiningDate = joiningDate;
            emp.leaves = Math.max(0, remaining); emp.totalLeaves = accruedDays;
          }
        });
        render();
      }
    }).catch(e => console.error('Failed to fetch leave settings:', e));

    // Load leaves, payslips, attendance, expenses, bonuses, meetings in parallel (background)
    Promise.all([
      trpcQuery('hr.leaves'),
      trpcQuery('hr.payslips'),
      trpcQuery('hr.attendance', { limit: 200 }),
      trpcQuery('hr.expenses', { limit: 500 }),
      trpcQuery('hr.bonusFines', { limit: 500 }),
      trpcQuery('hr.periodicMeetings', { limit: 200 }),
      trpcQuery('hr.meetingActions', {}),
    ]).then(([leaves, payslips, attendance, expenses, bonusFinesData, meetingsRaw, actionsRaw]) => {
      // Map leaves
      if (leaves && leaves.length > 0) {
        odooLeaves = leaves;
        leavesMock = leaves.map(l => ({
        emp: l.employee?.name || '—',
        empId: l.employee?.id || 0,
        type: l.leaveType?.name || '—',
        from: l.dateFrom ? new Date(l.dateFrom).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—',
        to: l.dateTo ? new Date(l.dateTo).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—',
        days: l.days || 0,
        state: l.state || 'draft',
        loggedBy: 'System',
        _raw: l,
      }));
    }

    // Map payslips
    if (payslips && payslips.length > 0) {
      odooPayslips = payslips;
      payslips.forEach(p => {
        const emp = emps.find(e => e.id === p.employee?.id);
        if (emp) emp.payslips = Math.max(emp.payslips, 1);
      });
    }

    // Map attendance
    if (attendance && attendance.length > 0) {
      odooAttendance = attendance;
      attendance.forEach(a => {
        const emp = emps.find(e => e.id === a.employee?.id);
        if (emp && a.checkIn) {
          const checkInTime = new Date(a.checkIn);
          emp.lastIn = checkInTime.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
          emp.attendance = (emp.attendance || 0) + 1;
          if (a.workedHours > 0) {
            emp.avgHours = Math.round(((emp.avgHours || 0) + a.workedHours) / 2 * 10) / 10;
          }
        }
      });
    }

      // Map expenses to expensesMock (hr.expense model - fuel, tolls, stationary)
    if (expenses && expenses.length > 0) {
      expensesMock = expenses.map(e => ({
        id: e.id,
        ref: `EXP/${String(e.id).padStart(4,'0')}`,
        emp: e.employee?.name || '—',
        empId: e.employee?.id || 0,
        type: 'expense',
        reason: e.name || '—',
        product: e.product?.name || '—',
        amount: e.amount || 0,
        days: 0,
        date: e.date ? new Date(e.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—',
        month: e.date ? new Date(e.date).toLocaleDateString('en-GB',{month:'long',year:'numeric'}) : '—',
        state: e.state || 'draft',
        company: e.company?.name || '—',
        companyId: e.company?.id || 0,
        description: e.description || '',
        _raw: e,
      }));
    } else {
      expensesMock = [];
    }

    // Map bonus.fine records to finesMock (real Odoo bonus.fine model)
    if (bonusFinesData && bonusFinesData.length > 0) {
      finesMock = bonusFinesData.map(r => ({
        id: r.id,
        ref: r.ref || `BF/${String(r.id).padStart(4,'0')}`,
        emp: r.employee?.name || '—',
        empId: r.employee?.id || 0,
        type: r.typeClass || 'fine', // 'bonus' | 'fine'
        reason: r.topic || r.category || '—',
        category: r.category || '—',
        typeLabel: r.typeId?.name || (r.typeClass === 'bonus' ? 'Bonus' : 'Fine'),
        amount: r.amount || 0,
        days: r.days || 0,
        dailyRate: r.dailyRate || 0,
        date: r.date ? new Date(r.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—',
        month: r.date ? new Date(r.date).toLocaleDateString('en-GB',{month:'long',year:'numeric'}) : '—',
        state: r.state || 'draft',
        company: r.company?.name || '—',
        companyId: r.company?.id || 0,
        details: r.details || '',
        _raw: r,
      }));
      // Update employee fine/bonus counts
      finesMock.forEach(f => {
        const emp = emps.find(e => e.id === f.empId);
        if (emp) {
          if (f.type === 'fine') emp.fines = (emp.fines || 0) + 1;
          else emp.bonuses = (emp.bonuses || 0) + 1;
        }
      });
    } else {
      finesMock = [];
    }

    // Map periodic.meeting records
    if (meetingsRaw && meetingsRaw.length > 0) {
      meetingsData = meetingsRaw.map(m => ({
        id: m.id,
        ref: m.ref,
        date: m.date,
        type: m.type, // 'weekly' | 'adhoc'
        topic: m.topic || '',
        details: m.details || '',
        attendeeIds: m.attendeeIds || [],
        attendeeCount: m.attendeeCount || 0,
        state: m.state, // 'draft' | 'done'
        company: m.company?.name || '—',
        companyId: m.company?.id || 0,
        createdBy: m.createdBy?.name || '—',
        actionCount: m.actionCount || 0,
        // Formatted date
        dateFormatted: m.date ? new Date(m.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—',
        month: m.date ? new Date(m.date).toLocaleDateString('en-GB',{month:'long',year:'numeric'}) : '—',
        year: m.date ? new Date(m.date).getFullYear() : 0,
        monthNum: m.date ? new Date(m.date).getMonth() + 1 : 0,
      }));
    } else {
      meetingsData = [];
    }

    // Map meeting actions data
    if (actionsRaw && actionsRaw.length > 0) {
      actionsData = actionsRaw.map(a => ({
        id: a.id,
        name: a.name,
        sequence: a.sequence,
        status: a.status, // pending | in_progress | done | cancelled
        dueDate: a.dueDate || null,
        notes: a.notes || null,
        assignedTo: a.assignedTo ? { id: a.assignedTo.id, name: a.assignedTo.name } : null,
        assigneeName: a.assignedTo ? a.assignedTo.name : 'Unassigned',
        meeting: a.meeting,
        meetingDate: a.meeting?.date || null,
        isOverdue: a.dueDate && a.status !== 'done' && a.status !== 'cancelled' && new Date(a.dueDate) < new Date(),
      }));
    } else {
      actionsData = [];
    }

      // Re-render with secondary data populated
      render();
    }).catch(err => console.error('Failed to load secondary HR data:', err));

  } catch (err) {
    console.error('Failed to load HR data:', err);
    document.getElementById('app').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px"><div style="font-size:28px">⚠️</div><div style="font-size:14px;font-weight:600;color:#C94444">Failed to load HR data</div><div style="font-size:11px;color:#64706C;max-width:400px;text-align:center">${err.message}</div><button onclick="loadData()" style="margin-top:12px;padding:8px 20px;background:#2D5A3D;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px">Retry</button></div>`;
  }
}

let _calcInterval=null;
let _calcAborted=false;

async function startCalcAnimation(){
  // Parse the selected period from the form
  const periodSelect = document.querySelector('.modal-body select');
  const periodVal = periodSelect ? periodSelect.value : 'March 2026';
  const parts = periodVal.split(' ');
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monthNum = monthNames.indexOf(parts[0]) + 1;
  const yearNum = parseInt(parts[1]);

  // Get meetings attended and target achieved from form
  const meetingsInput = document.querySelector('.modal-body input[type="number"]');
  const targetSelect = document.querySelectorAll('.modal-body select')[2]; // 3rd select
  const meetings = meetingsInput ? parseInt(meetingsInput.value) || 0 : 0;
  const targetAchieved = targetSelect ? targetSelect.value === 'Yes' : true;

  _calcAborted = false;
  state.calcLoading = true;
  state.calcStep = 0;
  state.calcPeriodLabel = periodVal;
  render();

  // Step animation while API call runs — update in-place to avoid full page flicker
  let step = 0;
  const stepLabels = ["Fetching manufacturing orders...","Loading quality inspections...","Processing purchase receipts...","Counting container loads...","Applying rates & adjustments..."];
  function updateCalcProgress(s) {
    const bar = document.querySelector('.calc-bar-fill');
    if(bar) bar.style.width = (s * 20) + '%';
    stepLabels.forEach((_, i) => {
      const el = document.querySelectorAll('.calc-step')[i];
      if(!el) return;
      const dot = el.querySelector('.calc-step-dot');
      if(i < s) { el.className='calc-step done'; if(dot){dot.style.background='#2D5A3D';dot.style.color='#fff';dot.textContent='✓';} }
      else if(i === s) { el.className='calc-step active'; if(dot){dot.style.background='#C0714A';dot.style.color='#fff';dot.textContent=String(i+1);} }
      else { el.className='calc-step'; if(dot){dot.style.background='#E4E1DC';dot.style.color='#95A09C';dot.textContent=String(i+1);} }
    });
  }
  _calcInterval = setInterval(() => {
    if(_calcAborted) { clearInterval(_calcInterval); _calcInterval = null; return; }
    step++;
    if(step < 5) {
      state.calcStep = step;
      updateCalcProgress(step);
    }
  }, 800);

  try {
    // Call the real Odoo API
    const result = await trpcMutate('hr.runIncentiveCalculation', { year: yearNum, month: monthNum });

    // Stop the step animation
    if(_calcInterval) { clearInterval(_calcInterval); _calcInterval = null; }
    if(_calcAborted) return;

    // Show final step
    state.calcStep = 5;
    render();

    if(!result) {
      showToast('Calculation failed — no data returned from Odoo.','error');
      state.modal = null; state.calcLoading = false; state.calcStep = 0;
      render();
      return;
    }

    // Build incCalcs entry from real data
    const ds = result.dataSources;
    const mo = ds.manufacturingOrders;
    const totalTons = mo.totalBalesProduced > 0 ? Math.round(mo.orders.reduce((s,o) => s + (o.qtyProduced || 0), 0) / 1000 * 100) / 100 : 0;
    const graded = mo.grade1Bales + mo.premiumBales + mo.supremeBales;
    const totalBales = mo.totalBalesProduced || 1;
    const qr = totalBales > 0 ? Math.round((graded / totalBales) * 1000) / 1000 : 0;
    const containers = ds.containerLoads.total;
    const procured = ds.purchaseReceipts.total;

    // Calculate incentive lines using rates
    const lines = [];
    const fmRate = incRates.find(r => r.cat === 'facility_manager');
    if(fmRate) {
      const inc = totalTons * fmRate.perTon;
      const adj = Math.round(inc * qr);
      const contI = containers * (fmRate.perCont || 0);
      const tgtB = targetAchieved ? (fmRate.targetB || 0) : 0;
      const meetD = (4 - meetings) * (fmRate.meetDed || 0);
      lines.push({emp:'Yasser Hussin',cat:'facility_manager',tons:totalTons,rate:fmRate.perTon,inc:Math.round(inc),adj,cont:containers,contR:fmRate.perCont||0,contI,tgt:targetAchieved,tgtB,meet:meetings,meetD:meetD>0?meetD:0,bon:0,fin:0,final:Math.round(adj+contI+tgtB-(meetD>0?meetD:0)),orders:mo.total,days:mo.completed});
    }

    // Supervisor lines (split evenly if multiple)
    const supRate = incRates.find(r => r.cat === 'supervisor');
    if(supRate) {
      const supTons = totalTons * 0.5;
      const inc = supTons * supRate.perTon;
      const adj = Math.round(inc * qr);
      lines.push({emp:'Supervisor',cat:'supervisor',tons:Math.round(supTons*100)/100,rate:supRate.perTon,inc:Math.round(inc),adj,cont:0,contR:0,contI:0,tgt:false,tgtB:0,meet:0,meetD:0,bon:0,fin:0,final:adj,orders:Math.round(mo.total/2),days:0});
    }

    // Production labor
    const plRate = incRates.find(r => r.cat === 'production_labor');
    if(plRate) {
      const inc = totalTons * plRate.perTon;
      const adj = Math.round(inc * qr);
      lines.push({emp:'Production Labor',cat:'production_labor',tons:totalTons,rate:plRate.perTon,inc:Math.round(inc),adj,cont:0,contR:0,contI:0,tgt:false,tgtB:0,meet:0,meetD:0,bon:0,fin:0,final:adj,orders:mo.total,days:0});
    }

    // Quality labor
    const qlRate = incRates.find(r => r.cat === 'quality_labor');
    if(qlRate) {
      const inc = totalTons * qlRate.perTon;
      const adj = Math.round(inc * qr);
      lines.push({emp:'Quality Labor',cat:'quality_labor',tons:totalTons,rate:qlRate.perTon,inc:Math.round(inc),adj,cont:0,contR:0,contI:0,tgt:false,tgtB:0,meet:0,meetD:0,bon:0,fin:0,final:adj,orders:mo.total,days:0});
    }

    // Driver
    const drRate = incRates.find(r => r.cat === 'driver');
    if(drRate && containers > 0) {
      const inc = totalTons * drRate.perTon;
      const adj = Math.round(inc * qr);
      const contI = containers * (drRate.perCont || 0);
      lines.push({emp:'Driver',cat:'driver',tons:totalTons,rate:drRate.perTon,inc:Math.round(inc),adj,cont:containers,contR:drRate.perCont||0,contI,tgt:false,tgtB:0,meet:0,meetD:0,bon:0,fin:0,final:Math.round(adj+contI),orders:mo.total,days:0});
    }

    // Procurement officer
    const poRate = incRates.find(r => r.cat === 'procurement_officer');
    if(poRate) {
      const moisture = totalTons * 0.14; // ~14% moisture estimate
      const netTons = totalTons - moisture;
      const inc = netTons * poRate.perTon;
      lines.push({emp:'Procurement Officer',cat:'procurement_officer',tons:totalTons,rate:poRate.perTon,inc:Math.round(inc),adj:Math.round(inc),cont:0,contR:0,contI:0,tgt:false,tgtB:0,meet:0,meetD:0,bon:0,fin:0,final:Math.round(inc),orders:procured,days:0,moist:Math.round(moisture*100)/100});
    }

    // Receiving quality
    const rqRate = incRates.find(r => r.cat === 'receiving_quality');
    if(rqRate) {
      const inc = totalTons * rqRate.perTon;
      lines.push({emp:'Receiving Quality',cat:'receiving_quality',tons:totalTons,rate:rqRate.perTon,inc:Math.round(inc),adj:Math.round(inc),cont:0,contR:0,contI:0,tgt:false,tgtB:0,meet:0,meetD:0,bon:0,fin:0,final:Math.round(inc),orders:mo.total,days:0});
    }

    const totalFinal = lines.reduce((s,l) => s + l.final, 0);
    const newId = incCalcs.length > 0 ? Math.max(...incCalcs.map(c => c.id)) + 1 : 1;
    const refNum = String(monthNum).padStart(2,'0');

    const newCalc = {
      id: newId,
      name: `INC/${yearNum}/${refNum}`,
      month: parts[0],
      year: String(yearNum),
      state: 'draft',
      totalTons: Math.round(totalTons * 100) / 100,
      qr,
      graded: graded,
      procured: procured,
      moisture: Math.round(totalTons * 0.14 * 100) / 100,
      containers,
      totalFinal: Math.round(totalFinal),
      fm: 'Yasser Hussin',
      fmMeet: meetings,
      fmTarget: targetAchieved,
      date: new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}),
      lines,
      // Store raw Odoo data for reference
      _odooData: {
        totalMOs: mo.total,
        completedMOs: mo.completed,
        totalBalesProduced: mo.totalBalesProduced,
        premiumBales: mo.premiumBales,
        grade1Bales: mo.grade1Bales,
        fairGradeBales: mo.fairGradeBales,
        alfamixBales: mo.alfamixBales,
        supremeBales: mo.supremeBales,
        qualityInspections: ds.qualityInspections.total,
        purchaseReceipts: ds.purchaseReceipts.total,
        containerLoads: ds.containerLoads.total,
        attendanceHours: ds.attendance.totalHoursWorked,
      }
    };

    // Add to the beginning of the list
    incCalcs.unshift(newCalc);

    // Brief delay to show completion
    await new Promise(r => setTimeout(r, 600));

    state.modal = null;
    state.calcLoading = false;
    state.calcStep = 0;
    state.selCalc = newCalc;
    state.expandCat = null;
    state.page = 'incDetail';
    render();

  } catch(err) {
    console.error('Incentive calculation failed:', err);
    if(_calcInterval) { clearInterval(_calcInterval); _calcInterval = null; }
    state.calcLoading = false;
    state.calcStep = 0;
    render();
    showToast('Calculation failed: '+(err.message||'Unknown error'),'error');
  }
}

function startModalSaving(label){
  const card=document.querySelector('.modal-card');
  if(!card) return;
  card.querySelectorAll('.modal-footer button').forEach(b=>{b.disabled=true;b.style.opacity='0.55';b.style.cursor='not-allowed';});
  if(card.querySelector('.modal-saving-overlay')) return;
  const ov=document.createElement('div');
  ov.className='modal-saving-overlay';
  Object.assign(ov.style,{position:'absolute',inset:'0',background:'rgba(255,255,255,.72)',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'12px',zIndex:'20',flexDirection:'column',gap:'10px',backdropFilter:'blur(2px)'});
  ov.innerHTML='<div class="modal-spinner"></div><div style="font-size:12px;font-weight:600;color:#2D5A3D">'+(label||'Saving...')+'</div>';
  card.style.position='relative';

}

function showModalError(msg){
  const card=document.querySelector('.modal-card');
  if(!card){showToast(msg,'error');return;}
  const ov=card.querySelector('.modal-saving-overlay');
  if(ov) ov.remove();
  card.querySelectorAll('.modal-footer button').forEach(b=>{b.disabled=false;b.style.opacity='1';b.style.cursor='pointer';});
  let errDiv=card.querySelector('.modal-inline-error');
  if(!errDiv){
    errDiv=document.createElement('div');
    errDiv.className='modal-inline-error';
    Object.assign(errDiv.style,{padding:'10px 20px',background:'#FEF2F2',borderTop:'1px solid #FCA5A5',color:'#C94444',fontSize:'12px',fontWeight:'600'});
    const footer=card.querySelector('.modal-footer');

    else card.appendChild(errDiv);
  }
  errDiv.textContent='⚠ '+msg;
  setTimeout(()=>{if(errDiv.parentNode) errDiv.remove();},6000);
}
function extractOdooError(err){
  let raw=err?.message||String(err||'Unknown error');
  try{
    const parsed=JSON.parse(raw);
    const msg=parsed?.json?.message||parsed?.message||raw;
    const clean=String(msg).split('\n')[0].replace(/^Odoo RPC error \([^)]+\):\s*/,'').trim();
    return clean||raw;
  }catch(e){}
  const m=raw.match(/"message":"([^"]+)"/);
  if(m) return m[1].split('\\n')[0].replace(/^Odoo RPC error \([^)]+\):\s*/,'').trim();
  return raw.length>150?raw.substring(0,150)+'...':raw;
}

  let contractId=parseInt(document.getElementById('ec_contract_id')?.value)||0;

    try{

async function saveLeaveSettings(){
  const e=state.selEmp;
  if(!e) return;
  const annualDays=parseFloat(document.getElementById('ls_annual')?.value)||21;
  const joiningDate=document.getElementById('ls_joining')?.value;
  if(!joiningDate){showModalError('Please enter a joining date.');return;}
  startModalSaving('Saving leave settings...');
  try{
    const result=await trpcMutate('hr.upsertLeaveSetting',{
      odooEmployeeId:e.id,
      employeeName:e.name,
      annualLeaveDays:annualDays,
      joiningDate:joiningDate
    });
    if(result){
      const monthlyRate=annualDays/12;
      const today=new Date();
      const joining=new Date(joiningDate);
      let monthsWorked=(today.getFullYear()-joining.getFullYear())*12+(today.getMonth()-joining.getMonth());
      const dayDiff=today.getDate()-joining.getDate();
      if(dayDiff>0) monthsWorked+=dayDiff/30;
      else if(dayDiff<0) monthsWorked-=1-(30+dayDiff)/30;
      monthsWorked=Math.max(0,monthsWorked);
      const accrued=Math.round(monthsWorked*monthlyRate*100)/100;
      const remaining=Math.round((accrued-e.leavesUsed)*100)/100;
      e._leaveSettings=result;
      e._accrued=accrued;
      e._monthlyRate=Math.round(monthlyRate*100)/100;
      e._monthsWorked=Math.round(monthsWorked*100)/100;
      e._joiningDate=joiningDate;
      e.leaves=Math.max(0,remaining);
      e.totalLeaves=accrued;
      leaveSettingsMap[e.id]=result;
      setState({modal:null,calcLoading:false,calcStep:0});
      showToast('Leave settings saved for '+e.name,'success');
    } else {
      showModalError('Failed to save leave settings. Please try again.');
    }
  } catch(err){
    showModalError('Error saving leave settings: '+extractOdooError(err));
  }
}

function setState(patch){
  const activeEl = document.activeElement;
  const wasFocused = activeEl && activeEl.tagName === "INPUT";
  const selStart = wasFocused ? activeEl.selectionStart : null;
  const selEnd = wasFocused ? activeEl.selectionEnd : null;
  const focusPlaceholder = wasFocused ? activeEl.placeholder : null;
  Object.assign(state,patch);
  if(patch.company!==undefined)localStorage.setItem('platfarm_company',patch.company);
  // Load salary history when switching to contract tab
  if(patch.selEmp&&patch.selEmp!==state.selEmp){state.empDocs=null;state.empDocsLoading=false;state.docFileName='';_docFile=null;}
  if(patch.empTab==='documents'&&state.selEmp&&!state.empDocsLoading){
    state.empDocsLoading=true;
    trpcQuery('hr.employeeDocs',{employeeId:state.selEmp.id}).then(docs=>{
      setState({empDocs:docs||[],empDocsLoading:false});
    }).catch(()=>setState({empDocs:[],empDocsLoading:false}));
  }
  if((patch.empTab==='contract'||patch.selEmp)&&state.empTab==='contract'&&state.selEmp&&!state.selEmp._salaryHistoryLoaded){
    const emp=state.selEmp;
    emp._salaryHistoryLoaded=true;
    trpcQuery('hr.getSalaryHistory',{odooEmployeeId:emp.id}).then(rows=>{
      emp._salaryHistory=rows||[];
      render();
    }).catch(()=>{emp._salaryHistory=[];});
  }
  render();
  if (wasFocused && focusPlaceholder) {
    const newInput = document.querySelector('input[placeholder="' + focusPlaceholder + '"]');
    if (newInput) {
      newInput.focus();
      if (selStart !== null) { try { newInput.setSelectionRange(selStart, selEnd); } catch(e) {} }
    }
  }
}

function ring(value,total,size=60,stroke=5,color="#2D5A3D"){
  const r=(size-stroke)/2;const c=2*Math.PI*r;const pct=total?value/total:0;
  return `<div style="position:relative;width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#E4E1DC" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${pct*c} ${c}" stroke-linecap="round" style="transition:stroke-dasharray .8s cubic-bezier(.16,1,.3,1)"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
      <span class="mn" style="font-size:${size>50?13:10}px;color:${color}">${Math.round(pct*100)}%</span>
    </div>
  </div>`;
}

}
function formInput(label,opts={}){
  const {type="text",value="",placeholder="",options,textarea,disabled,id,hint}=opts;
  const idAttr=id?` id="${id}"`:""; 
  let input;
  if(textarea) input=`<textarea${idAttr} style="${disabled?'background:#FAFAF8':''}" placeholder="${placeholder}" ${disabled?'disabled':''}>${value}</textarea>`;
  else if(options) input=`<select${idAttr} ${disabled?'disabled':''} style="${disabled?'background:#FAFAF8':''}"> ${options.map(o=>`<option value="${o}" ${o===value?'selected':''}>${o}</option>`).join('')}</select>`;
  else input=`<input${idAttr} type="${type}" value="${value}" placeholder="${placeholder}" ${disabled?'disabled':''} style="${type==='date'?'font-family:JetBrains Mono,monospace':''}${disabled?';background:#FAFAF8':''}"/>`;
  const hintEl=hint?`<div style="font-size:9px;color:#95A09C;margin-top:3px">${hint}</div>`:'';
  return `<div class="fi"><label>${label}</label>${input}${hintEl}</div>`;
}
function calcEgyptIncomeTax(monthlyWage){
  const annual=monthlyWage*12;
  const exempt=15000;
  const taxable=Math.max(0,annual-exempt);
  const brackets=[[15000,0.0],[15000,0.025],[15000,0.10],[15000,0.15],[140000,0.20],[200000,0.225],[Infinity,0.25]];
  let tax=0,remaining=taxable;
  for(const[limit,rate]of brackets){const chunk=Math.min(remaining,limit);tax+=chunk*rate;remaining-=chunk;if(remaining<=0)break;}
  return Math.round(tax/12);
}
function updatePayslipSummary(){
  const wage=parseFloat(document.getElementById('log_ps_wage')?.value)||0;
  const housing=parseFloat(document.getElementById('log_ps_housing')?.value)||0;
  const transport=parseFloat(document.getElementById('log_ps_transport')?.value)||0;
  const other=parseFloat(document.getElementById('log_ps_other')?.value)||0;
  const ot=parseFloat(document.getElementById('log_ps_overtime')?.value)||0;
  const bonus=parseFloat(document.getElementById('log_ps_bonus_amt')?.value)||0;
  const incentive=parseFloat(document.getElementById('log_ps_incentive')?.value)||0;
  const otherEarn=parseFloat(document.getElementById('log_ps_other_earn')?.value)||0;
  const si=parseFloat(document.getElementById('log_ps_socialins')?.value)||0;
  const tax=parseFloat(document.getElementById('log_ps_tax')?.value)||0;
  const fines=parseFloat(document.getElementById('log_ps_fines')?.value)||0;
  const loan=parseFloat(document.getElementById('log_ps_loan')?.value)||0;
  const gross=wage+housing+transport+other+ot+bonus+incentive+otherEarn;
  const ded=si+tax+fines+loan;
  const el_g=document.getElementById('ps_sum_gross');
  const el_d=document.getElementById('ps_sum_ded');
  const el_n=document.getElementById('ps_sum_net');
  if(el_g) el_g.textContent=gross.toLocaleString();
  if(el_d) el_d.textContent=ded>0?'-'+ded.toLocaleString():'0';
  if(el_n) el_n.textContent=(gross-ded).toLocaleString();
}

function triggerFileBox(boxId){

  else if(boxId==='wiz-photo'){const el=document.getElementById('wiz-photo-input');if(el)el.click();}

function handleFileDrop(event,boxId){
  event.preventDefault();
  const file=event.dataTransfer?.files?.[0];
  if(!file) return;
  if(boxId==='doc'){_docFile=file;setState({docFileName:file.name});}
}

function clearDocFile(event,boxId){

}

async function submitDocUpload(){
  const e=state.selEmp;
  if(!e){showModalError('No employee selected.');return;}
  if(!_docFile){showModalError('Please select a file to upload.');return;}
  const docTypeEl=document.querySelector('.modal-body select');
  const descEl=document.querySelectorAll('.modal-body input[type="text"]')[0]||document.querySelectorAll('.modal-body textarea')[0];
  const docType=docTypeEl?docTypeEl.value:'Document';
  const description=descEl?descEl.value:'';
  if(_docFile.size>10*1024*1024){showModalError('File too large. Maximum size is 10MB.');return;}
  startModalSaving('Uploading document...');
  try{
    const base64=await new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result.split(',')[1]);
      reader.onerror=reject;
      reader.readAsDataURL(_docFile);
    });
    const result=await trpcMutate('hr.uploadEmployeeDoc',{
      employeeId:e.id,
      name:docType+' - '+_docFile.name,
      data:base64,
      mimeType:_docFile.type||'application/octet-stream',
      description:description||(docType+' for '+e.name),
    });
    if(result&&result.success){
      const uploadedName=_docFile?.name||docType;
      _docFile=null;
      const inp=document.getElementById('doc-file-input');
      if(inp) inp.value='';
      // Refresh docs list
      const docs=await trpcQuery('hr.employeeDocs',{employeeId:e.id}).catch(()=>[]);
      showModalSuccess('Document Uploaded',uploadedName+' uploaded successfully for '+e.name+'.');
      setState({modal:null,docFileName:'',empDocs:docs||[],empDocsLoading:false});
    } else {
      showModalError('Upload failed. Please try again.');
    }
  }catch(err){
    console.error('Doc upload error:',err);
    showModalError('Upload failed: '+extractOdooError(err));
  }
}

async function handlePhotoFileSelect(input){
  const e=state.selEmp;
  if(!e) return;
  const file=input.files?.[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){showToast('Please select an image file.','error');return;}
  if(file.size>5*1024*1024){showToast('Image too large. Maximum size is 5MB.','error');return;}
  showToast('Uploading photo...','info');
  try{
    const base64=await new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result.split(',')[1]);
      reader.onerror=reject;
      reader.readAsDataURL(file);
    });
    const result=await trpcMutate('hr.updateEmployeePhoto',{employeeId:e.id,imageBase64:base64});
    if(result&&result.success){
      // Immediately update in-memory so the avatar changes right away
      e.pic='data:'+file.type+';base64,'+base64;
      e.avatar=base64;
      render();
      showToast('Photo updated! Reloading...','success');
      // Fetch fresh employee data from Odoo to confirm image_128 is updated
      setTimeout(async()=>{
        try{
          const fresh=await trpcQuery('hr.employeeById',{id:e.id});
          if(fresh&&fresh.avatar){
            e.pic=fresh.avatar.startsWith('data:')?fresh.avatar:'data:image/png;base64,'+fresh.avatar;
            e.avatar=fresh.avatar.replace(/^data:[^;]+;base64,/,'');
          } else if(fresh) {
            // fresh might not have avatar yet if Odoo is still processing — keep data URL
          }
          render();
          showToast('Profile photo updated successfully.','success');
        }catch(fetchErr){
          // Keep the data URL we already set — photo is in Odoo, will reflect on next full reload
          showToast('Profile photo updated successfully.','success');
        }
      },1500);
    } else {
      showToast('Photo upload failed. Please try again.','error');
    }
  }catch(err){
    console.error('Photo upload error:',err);
    showToast('Photo upload failed: '+(err?.message||String(err)),'error');
  }
  input.value='';
}

function deleteEmployeeDoc(docId,docName){
  if(_pendingDeleteId===docId){
    // Second click: actually delete
    _pendingDeleteId=null;
    trpcMutate('hr.deleteEmployeeDoc',{attachmentId:docId}).then(result=>{
      if(result&&result.success){
        showToast('Document deleted.','success');
        return trpcQuery('hr.employeeDocs',{employeeId:state.selEmp.id}).catch(()=>[]);
      } else {

      }
    }).then(docs=>setState({empDocs:docs||[]})).catch(err=>{
      showToast('Error: '+extractOdooError(err),'error');
    });
  } else {
    // First click: ask for confirmation via toast
    _pendingDeleteId=docId;
    showToast('Click ✕ again to confirm delete','info');
    setTimeout(()=>{ if(_pendingDeleteId===docId) _pendingDeleteId=null; },3000);
  }
}

async function downloadEmployeeDoc(docId,docName){
  showToast('Preparing download...','info');
  try{
    const result=await trpcQuery('hr.getDocContent',{attachmentId:docId});
    if(!result||!result.data) throw new Error('No data returned');
    const byteChars=atob(result.data);
    const bytes=new Uint8Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) bytes[i]=byteChars.charCodeAt(i);
    const ext=(docName||'').split('.').pop().toLowerCase();
    const mimeMap={pdf:'application/pdf',jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',
      doc:'application/msword',docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
      xls:'application/vnd.ms-excel',xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'};
    const mime=mimeMap[ext]||'application/octet-stream';
    const blob=new Blob([bytes],{type:mime});
    const url=URL.createObjectURL(blob);
    // Use top window for download to work in iframe context
    const targetDoc=(window.top||window).document;
    const a=targetDoc.createElement('a');a.href=url;a.download=docName;a.style.display='none';
    targetDoc.body.appendChild(a);a.click();targetDoc.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),5000);
  }catch(err){
    showToast('Download failed: '+(err?.message||String(err)),'error');
  }
}

// ─── BUILD ACTIVITY LOG (respects company & employee filter) ─────────────────────────────
function buildActivityLog(forEmployee) {
  const log = [];
  const co = state.company;
  const isAll = co === 'All Companies';
  // When viewing a specific employee profile, filter by that employee
  const empId = forEmployee ? forEmployee.id : null;
  const empName = forEmployee ? forEmployee.name : null;

  // Filter leaves by company, then by employee if on profile
  let filteredLeaves = isAll ? odooLeaves : odooLeaves.filter(l => l.company?.name === co);
  if (empId) filteredLeaves = filteredLeaves.filter(l => l.employee?.id === empId || l.employee?.name === empName);
  filteredLeaves.slice(0, 5).forEach(l => {
    log.push({
      icon: '🏖️',
      text: `Leave: ${l.employee?.name || '—'} — ${l.leaveType?.name || '—'} (${l.days}d)`,
      time: l.dateFrom ? new Date(l.dateFrom).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—',
      color: '#D4960A'
    });
  });

  // Filter payslips by company, then by employee if on profile
  let filteredPayslips = isAll ? odooPayslips : odooPayslips.filter(p => p.company?.name === co);
  if (empId) filteredPayslips = filteredPayslips.filter(p => p.employee?.id === empId || p.employee?.name === empName);
  filteredPayslips.slice(0, 3).forEach(p => {
    log.push({
      icon: '📋',
      text: `Payslip ${p.number || p.name} — ${p.employee?.name || '—'}`,
      time: p.dateFrom ? new Date(p.dateFrom).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—',
      color: '#2D5A3D'
    });
  });

  // Filter expenses by company, then by employee if on profile
  if (dashboardStats?.recentExpenses) {
    let filteredExpenses = isAll ? dashboardStats.recentExpenses : dashboardStats.recentExpenses.filter(ex => ex.company?.name === co);
    if (empId) filteredExpenses = filteredExpenses.filter(ex => ex.employee?.id === empId || ex.employee?.name === empName);
    filteredExpenses.slice(0, 5).forEach(ex => {
      log.push({
        icon: '💰',
        text: `Expense: ${ex.employee?.name || '—'} — ${ex.name} (${ex.amount} ${currencyForCompany(ex.company?.name||'')})`,
        time: ex.date || '—',
        color: '#C0714A'
      });
    });
  }

  // Also include bonus/fine records for this employee from finesMock
  if (empId) {
    const empFinesLog = finesMock.filter(f => f.empId === empId);
    empFinesLog.slice(0, 3).forEach(f => {
      log.push({
        icon: f.type === 'bonus' ? '🏆' : '⚠️',
        text: `${f.type === 'bonus' ? 'Bonus' : 'Fine'}: ${f.emp} — ${f.topic || f.category} (${f.amount} ${getCurrency(forEmployee)})`,
        time: f.date || '—',
        color: f.type === 'bonus' ? '#2D5A3D' : '#C94444'
      });
    });
  }

  // Sort by date descending
  log.sort((a, b) => {
    const da = a.time !== '—' ? new Date(a.time).getTime() : 0;
    const db = b.time !== '—' ? new Date(b.time).getTime() : 0;
    return db - da;
  });

  // Fallback if no activity
  if (log.length === 0) {
    const label = empName ? empName : (isAll ? 'Odoo' : co.split('-')[0]);
    log.push(
      {icon:'ℹ️', text: `No recent activity recorded for ${label}`, time:'—', color:'#95A09C'}
    );
  }
  return log;
}

    else if(apPeriod==='30d'){apDateFrom=new Date(now-30*864e5);}
    else if(apPeriod==='90d'){apDateFrom=new Date(now-90*864e5);}
    else if(apPeriod==='custom'){apDateFrom=state.apFrom?new Date(state.apFrom+'T00:00:00'):null;}
    const apDateTo=apPeriod==='custom'&&state.apTo?new Date(state.apTo+'T23:59:59'):now;
    // Filter actions by meeting date in period
    let filteredActions=actionsData;
    if(apDateFrom) filteredActions=filteredActions.filter(a=>a.meetingDate&&new Date(a.meetingDate+'T00:00:00')>=apDateFrom&&new Date(a.meetingDate+'T00:00:00')<=apDateTo);
    const total=filteredActions.length;
    const pending=filteredActions.filter(a=>a.status==='pending').length;
    const inProgress=filteredActions.filter(a=>a.status==='in_progress').length;
    const done=filteredActions.filter(a=>a.status==='done').length;
    const cancelled=filteredActions.filter(a=>a.status==='cancelled').length;
    const overdue=filteredActions.filter(a=>a.isOverdue).length;
    const completionRate=total>0?Math.round(done/total*100):0;
    // Period selector
    html+=`<div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap">`;
    html+=`<div style="font-size:11px;font-weight:700;color:#2C3E50;margin-right:4px">Period:</div>`;
    [['7d','Last 7 Days'],['30d','Last 30 Days'],['90d','Last 90 Days'],['all','All Time'],['custom','Custom']].forEach(([v,l])=>{
      html+=`<button onclick="setState({apPeriod:'${v}'})" style="padding:5px 12px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid ${apPeriod===v?'#2D5A3D':'#E4E1DC'};background:${apPeriod===v?'#2D5A3D':'#fff'};color:${apPeriod===v?'#fff':'#64706C'}">${l}</button>`;
    });
    if(apPeriod==='custom'){
      html+=`<input type="date" value="${state.apFrom||''}" onchange="setState({apFrom:this.value})" style="padding:5px 8px;border:1px solid #E4E1DC;border-radius:6px;font-size:10px;font-family:'JetBrains Mono',monospace"/>`;
      html+=`<span style="font-size:10px;color:#95A09C">to</span>`;
      html+=`<input type="date" value="${state.apTo||''}" onchange="setState({apTo:this.value})" style="padding:5px 8px;border:1px solid #E4E1DC;border-radius:6px;font-size:10px;font-family:'JetBrains Mono',monospace"/>`;
    }
    html+=`</div>`;
    // KPI row
    html+=`<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px">`;
    [
      ['Total Tasks',total,'all tasks','#2C3E50','#F7F6F3'],
      ['Pending',pending,'awaiting action','#D4960A','#FDF6EC'],
      ['In Progress',inProgress,'being worked on','#3B5BDB','#E8F0FE'],
      ['Done',done,'completed','#2D5A3D','#E4EFE6'],
      ['Overdue',overdue,'past due date','#C94444','#FDF0F0'],
      ['Completion',completionRate+'%',done+' of '+total+' done','#4A7C59','#F2F7F3'],
    ].forEach(([l,v,s,c,bg])=>{
      html+=`<div style="background:${bg};border:1px solid #E4E1DC;border-radius:9px;padding:14px 12px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#95A09C;margin-bottom:6px">${l}</div><div style="font-size:20px;font-weight:800;color:${c};font-family:'JetBrains Mono',monospace">${v}</div><div style="font-size:9px;color:#95A09C;margin-top:4px">${s}</div></div>`;
    });
    html+=`</div>`;
    // Completion progress bar
    html+=`<div style="background:#fff;border:1px solid #E4E1DC;border-radius:9px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:16px">`;
    html+=`<div style="font-size:11px;font-weight:600;color:#2C3E50;white-space:nowrap">Overall Completion</div>`;
    html+=`<div style="flex:1;height:10px;background:#E4E1DC;border-radius:5px;overflow:hidden"><div style="height:100%;width:${completionRate}%;background:${completionRate===100?'#2D5A3D':completionRate>=70?'#4A7C59':completionRate>=40?'#D4960A':'#C94444'};border-radius:5px;transition:width .5s"></div></div>`;
    html+=`<div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#2C3E50;white-space:nowrap">${completionRate}%</div>`;
    html+=`</div>`;
    // Fulfillment per assignee
    const assigneeMap={};
    filteredActions.forEach(a=>{
      const key=a.assigneeName||'Unassigned';
      if(!assigneeMap[key]) assigneeMap[key]={name:key,total:0,pending:0,inProgress:0,done:0,cancelled:0,overdue:0};
      assigneeMap[key].total++;
      if(a.status==='pending') assigneeMap[key].pending++;
      if(a.status==='in_progress') assigneeMap[key].inProgress++;
      if(a.status==='done') assigneeMap[key].done++;
      if(a.status==='cancelled') assigneeMap[key].cancelled++;
      if(a.isOverdue) assigneeMap[key].overdue++;
    });
    const assigneeRows=Object.values(assigneeMap).sort((a,b)=>b.total-a.total);
    if(assigneeRows.length>0){
      html+=`<div class="xc" style="margin-bottom:16px"><div class="xh"><h3>👤 Fulfillment by Assignee</h3><span class="ct">${assigneeRows.length} people</span></div>`;
      html+=`<div style="padding:16px;display:flex;flex-direction:column;gap:12px">`;
      assigneeRows.forEach(r=>{
        const rate=r.total>0?Math.round(r.done/r.total*100):0;
        const barColor=rate===100?'#2D5A3D':rate>=70?'#4A7C59':rate>=40?'#D4960A':'#C94444';
        html+=`<div style="background:#FAFAF8;border:1px solid #E4E1DC;border-radius:8px;padding:12px 14px">`;
        html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">`;
        html+=`<div style="font-size:11px;font-weight:700;color:#2C3E50">${r.name}</div>`;
        html+=`<div style="display:flex;gap:8px;align-items:center">`;
        html+=badge('pending',`${r.pending} pending`);
        if(r.inProgress>0) html+=badge('in_progress',`${r.inProgress} in progress`);
        if(r.overdue>0) html+=badge('absent',`${r.overdue} overdue`);
        html+=`<span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;color:${barColor}">${rate}%</span>`;
        html+=`</div></div>`;
        html+=`<div style="display:flex;align-items:center;gap:10px">`;
        html+=`<div style="flex:1;height:8px;background:#E4E1DC;border-radius:4px;overflow:hidden"><div style="height:100%;width:${rate}%;background:${barColor};border-radius:4px;transition:width .5s"></div></div>`;
        html+=`<div style="font-size:9px;color:#95A09C;white-space:nowrap">${r.done}/${r.total} done</div>`;
        html+=`</div></div>`;
      });
      html+=`</div></div>`;
    }
    // Overdue tasks table
    const overdueActions=filteredActions.filter(a=>a.isOverdue).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
    if(overdueActions.length>0){
      html+=`<div class="xc" style="margin-bottom:16px"><div class="xh" style="background:#C94444"><h3>⚠️ Overdue Action Points</h3><span class="ct">${overdueActions.length} overdue</span></div>`;
      html+=`<table class="tbl"><thead><tr><th>Action</th><th>Assigned To</th><th>Due Date</th><th>Days Overdue</th><th>Meeting</th><th>Status</th></tr></thead><tbody>`;
      overdueActions.forEach(a=>{
        const daysOverdue=Math.floor((now-new Date(a.dueDate+'T00:00:00'))/864e5);
        const dueFmt=new Date(a.dueDate+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
        html+=`<tr onclick="openMeetingDetail(${a.meeting.id})" style="cursor:pointer">`;
        html+=`<td style="font-size:11px;max-width:240px">${a.name}</td>`;
        html+=`<td style="font-size:10px">${a.assigneeName}</td>`;
        html+=`<td class="mn" style="font-size:10px;color:#C94444;font-weight:700">${dueFmt}</td>`;
        html+=`<td class="mn" style="font-size:10px;color:#C94444;font-weight:700">${daysOverdue}d</td>`;
        html+=`<td style="font-size:10px;color:#4A7C59">${a.meeting.ref}</td>`;
        html+=`<td>${badge(a.status,a.status==='in_progress'?'In Progress':'Pending')}</td>`;
        html+=`</tr>`;
      });
      html+=`</tbody></table></div>`;
    }
    // All pending tasks table
    const pendingActions=filteredActions.filter(a=>a.status==='pending'||a.status==='in_progress').sort((a,b)=>{
      if(a.isOverdue&&!b.isOverdue) return -1;
      if(!a.isOverdue&&b.isOverdue) return 1;
      if(a.dueDate&&b.dueDate) return new Date(a.dueDate)-new Date(b.dueDate);
      if(a.dueDate) return -1;
      if(b.dueDate) return 1;
      return 0;
    });
    html+=`<div class="xc"><div class="xh"><h3>📋 All Open Action Points</h3><span class="ct">${pendingActions.length} open</span></div>`;
    if(pendingActions.length===0){
      html+=`<div style="padding:32px;text-align:center;color:#B0BAB6"><div style="font-size:24px;margin-bottom:8px">✅</div><div style="font-size:12px">All tasks completed for this period</div></div>`;
    } else {
      html+=`<table class="tbl"><thead><tr><th>Action</th><th>Assigned To</th><th>Due Date</th><th>Meeting</th><th>Meeting Date</th><th>Status</th><th>Update</th></tr></thead><tbody>`;
      pendingActions.forEach(a=>{
        const dueFmt=a.dueDate?new Date(a.dueDate+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
        const meetDateFmt=a.meetingDate?new Date(a.meetingDate+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
        html+=`<tr>`;
        html+=`<td style="font-size:10px">${a.name}</td>`;
        html+=`<td style="font-size:10px">${a.assigneeName}</td>`;

        html+=`<td style="font-size:10px;color:#4A7C59;cursor:pointer" onclick="openMeetingDetail(${a.meeting.id})">${a.meeting.ref}</td>`;
        html+=`<td class="mn" style="font-size:10px;color:#64706C">${meetDateFmt}</td>`;
        html+=`<td>${badge(a.status,a.status==='in_progress'?'In Progress':'Pending')}</td>`;
        html+=`<td><select data-action-id="${a.id}" class="fsel" style="height:26px;font-size:10px" onchange="updateActionStatusFromDashboard(${a.id},this.value)"><option value="pending" ${a.status==='pending'?'selected':''}>Pending</option><option value="in_progress" ${a.status==='in_progress'?'selected':''}>In Progress</option><option value="done" ${a.status==='done'?'selected':''}>Done</option><option value="cancelled" ${a.status==='cancelled'?'selected':''}>Cancelled</option></select></td>`;
        html+=`</tr>`;
      });
      html+=`</tbody></table>`;
    }
    html+=`</div>`;
    html+=`</div>`;

  // ── MEETING DETAIL PAGE ──
  if(state.page==="meetingDetail"){
    html+=`<div class="page-content">`;
    if(meetingDetailLoading){
      html+=`<div style="text-align:center;padding:60px"><div class="calc-spinner" style="margin:0 auto 16px"></div><div style="font-size:13px;color:#64706C">Loading meeting details...</div></div>`;
    } else if(!meetingDetailData){
      html+=`<div style="text-align:center;padding:60px;color:#B0BAB6"><div style="font-size:32px;margin-bottom:8px">⚠️</div><div style="font-size:13px">Meeting not found</div></div>`;
    } else {
      const md=meetingDetailData;
