  // Error
  if (state.mandEditError) {
    body.appendChild(h("div", { style: { padding: "8px 12px", background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: "6px", fontSize: "11px", color: "#991B1B", marginBottom: "12px" } }, state.mandEditError));
  }

  // Form fields
  const fieldStyle = { display: "block", fontSize: "10px", fontWeight: "600", color: C.gray, textTransform: "uppercase", letterSpacing: "0.3px", marginBottom: "4px" };
  const inputStyle = { width: "100%", height: "36px", padding: "0 12px", border: "1px solid " + C.border, borderRadius: "7px", fontFamily: FONT, fontSize: "12px", outline: "none", background: "white" };

  // Expiry Date
  const expiryField = h("div", { style: { marginBottom: "12px" } });
  expiryField.appendChild(h("label", { style: fieldStyle }, "Expiry Date *"));
  expiryField.appendChild(h("input", { type: "date", value: form.expiryDate, style: inputStyle, onInput: (e) => { state.mandEditForm.expiryDate = e.target.value; } }));
  body.appendChild(expiryField);

  // Issue Date
  const issueField = h("div", { style: { marginBottom: "12px" } });
  issueField.appendChild(h("label", { style: fieldStyle }, "Issue Date"));
  issueField.appendChild(h("input", { type: "date", value: form.issueDate, style: inputStyle, onInput: (e) => { state.mandEditForm.issueDate = e.target.value; } }));
  body.appendChild(issueField);

  // Reference Number
  const refField = h("div", { style: { marginBottom: "12px" } });
  refField.appendChild(h("label", { style: fieldStyle }, "Reference Number"));
  refField.appendChild(h("input", { type: "text", value: form.referenceNumber, placeholder: "e.g. CR-2024-12345", style: inputStyle, onInput: (e) => { state.mandEditForm.referenceNumber = e.target.value; } }));
  body.appendChild(refField);

  // Notes
  const notesField = h("div", { style: { marginBottom: "12px" } });
  notesField.appendChild(h("label", { style: fieldStyle }, "Notes"));
  const notesArea = h("textarea", { value: form.notes, placeholder: "Additional notes...", style: { ...inputStyle, height: "60px", padding: "8px 12px", resize: "vertical" }, onInput: (e) => { state.mandEditForm.notes = e.target.value; } });
  notesField.appendChild(notesArea);
  body.appendChild(notesField);

  // ─── Renewal History Timeline ───────────────────────────────────────
  const historySection = h("div", { style: { marginTop: "8px", borderTop: "1px solid " + C.border, paddingTop: "12px" } });
  historySection.appendChild(h("label", { style: { display: "block", fontSize: "10px", fontWeight: "700", color: C.sage, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "8px" } }, "\ud83d\udcdc Renewal History"));

  if (state.mandRenewalLoading) {
    historySection.appendChild(h("div", { style: { fontSize: "11px", color: C.muted, padding: "8px 0" } }, "Loading history..."));
  } else if (state.mandRenewalHistory.length === 0) {
    historySection.appendChild(h("div", { style: { fontSize: "11px", color: C.muted, padding: "8px 0", fontStyle: "italic" } }, "No renewal history yet. When you renew this document, previous versions will appear here."));
  } else {
    const timeline = h("div", { style: { position: "relative", paddingLeft: "20px" } });
    // Vertical line
    timeline.appendChild(h("div", { style: { position: "absolute", left: "7px", top: "4px", bottom: "4px", width: "2px", background: C.border, borderRadius: "1px" } }));
    state.mandRenewalHistory.forEach((renewal, idx) => {
      const item = h("div", { style: { position: "relative", marginBottom: "12px", paddingBottom: idx < state.mandRenewalHistory.length - 1 ? "0" : "0" } });
      // Dot
      item.appendChild(h("div", { style: { position: "absolute", left: "-16px", top: "4px", width: "10px", height: "10px", borderRadius: "50%", background: idx === 0 ? "#F59E0B" : C.border, border: "2px solid white", boxShadow: "0 0 0 1px " + C.border } }));
      // Content
      const content = h("div", { style: { background: idx === 0 ? "#FFFBEB" : C.pageBg, border: "1px solid " + (idx === 0 ? "#FDE68A" : C.border), borderRadius: "8px", padding: "8px 10px" } });
      const topRow = h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "4px" } });
      topRow.appendChild(h("div", { style: { fontSize: "11px", fontWeight: "600", color: C.dark } }, renewal.previousDocumentName || "Document #" + renewal.previousOdooDocId));
      const renewDate = renewal.renewedAt ? new Date(renewal.renewedAt).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : "";
      topRow.appendChild(h("div", { style: { fontSize: "9px", color: C.muted } }, renewDate));
      content.appendChild(topRow);
      const details = h("div", { style: { display: "flex", gap: "12px", flexWrap: "wrap" } });
      if (renewal.previousExpiryDate) {
        const expDate = new Date(renewal.previousExpiryDate).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
        details.appendChild(h("span", { style: { fontSize: "10px", color: C.muted } }, "Expired: " + expDate));
      }
      if (renewal.previousReferenceNumber) {
        details.appendChild(h("span", { style: { fontSize: "10px", color: C.muted } }, "Ref: " + renewal.previousReferenceNumber));
      }
      details.appendChild(h("span", { style: { fontSize: "10px", color: C.muted } }, "Odoo ID: " + renewal.previousOdooDocId));
      if (renewal.renewedByName) {
        details.appendChild(h("span", { style: { fontSize: "10px", color: C.forest, fontWeight: "500" } }, "by " + renewal.renewedByName));
      }
      content.appendChild(details);
      if (renewal.notes) {
        content.appendChild(h("div", { style: { fontSize: "10px", color: C.gray, marginTop: "4px", fontStyle: "italic" } }, renewal.notes));
      }
      item.appendChild(content);
      timeline.appendChild(item);
    });
    historySection.appendChild(timeline);
  }
  body.appendChild(historySection);

  card.appendChild(body);

  // Footer
  const footer = h("div", { style: { padding: "14px 20px", borderTop: "1px solid " + C.border, display: "flex", justifyContent: "flex-end", gap: "8px" } });
  footer.appendChild(h("button", { className: "bg", onClick: () => setState({ mandShowEditModal: false }) }, "Cancel"));
  footer.appendChild(h("button", { className: "bp", disabled: state.mandEditSaving, onClick: () => mandSave() }, state.mandEditSaving ? "Saving..." : "Save"));
  card.appendChild(footer);

  bg.appendChild(card);
  return bg;
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER — MANDATORY DOC LINK MODAL (Folder Tree + Search)
// ═══════════════════════════════════════════════════════════════════════════
function renderMandLinkModal() {
  if (!state.mandShowLinkModal) return null;

  const bg = h("div", { className: "modal-bg" });
  const card = h("div", {
    style: { background: "white", borderRadius: "16px", width: "640px", maxHeight: "85vh", overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.2)", display: "flex", flexDirection: "column" },
    onClick: (e) => e.stopPropagation(),
  });

  // Header
  const header = h("div", { style: { padding: "16px 20px", borderBottom: "1px solid " + C.border, display: "flex", alignItems: "center", justifyContent: "space-between" } });
  const headerInfo = h("div");
  headerInfo.appendChild(h("h3", { style: { fontSize: "16px", fontWeight: "700", color: C.dark, margin: "0" } }, "Link from Odoo Documents"));
  headerInfo.appendChild(h("p", { style: { fontSize: "11px", color: C.muted, margin: "2px 0 0" } }, "Browse folders or search documents in Odoo to link to this record"));
  header.appendChild(headerInfo);
  header.appendChild(h("button", {
    style: { width: "28px", height: "28px", borderRadius: "6px", border: "none", background: C.pageBg, cursor: "pointer", fontSize: "14px", display: "flex", alignItems: "center", justifyContent: "center" },
    onClick: () => setState({ mandShowLinkModal: false }),
  }, "\u2715"));
  card.appendChild(header);

  // Folder Tree Dropdown
  const folderSection = h("div", { style: { padding: "12px 20px 0", borderBottom: "1px solid " + C.border, paddingBottom: "12px" } });
  folderSection.appendChild(h("div", { style: { fontSize: "10px", fontWeight: "700", color: C.forest, marginBottom: "6px", textTransform: "uppercase", letterSpacing: "0.5px" } }, "Browse Folders"));
  const folderDropWrapper = h("div", { style: { position: "relative" } });

  // Folder dropdown button
  const folderBtnLabel = state.mandLinkFolderPath.length > 0
    ? state.mandLinkFolderPath.map(f => f.name).join(" / ")
    : "All Workspaces (select a folder)";
  const folderBtn = h("button", {
    type: "button",
    style: {
      width: "100%", padding: "9px 12px", borderRadius: "8px",
      border: "1px solid " + (state.mandFolderDropdownOpen ? C.forest : C.border),
      background: state.mandFolderDropdownOpen ? C.gBg : "white",
      fontSize: "13px", fontFamily: FONT, color: C.dark,
      cursor: "pointer", display: "flex", alignItems: "center",
      justifyContent: "space-between", textAlign: "left", transition: "all .15s",
    },
    onClick: (e) => { e.stopPropagation(); setState({ mandFolderDropdownOpen: !state.mandFolderDropdownOpen }); },
  });
  const folderBtnInner = h("div", { style: { display: "flex", alignItems: "center", gap: "8px", minWidth: "0", flex: "1" } });
  folderBtnInner.appendChild(h("span", { innerHTML: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="' + C.forest + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>' }));
  folderBtnInner.appendChild(h("span", { style: { overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, folderBtnLabel));
  folderBtn.appendChild(folderBtnInner);
  folderBtn.appendChild(h("span", { innerHTML: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="' + C.muted + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .15s;transform:' + (state.mandFolderDropdownOpen ? 'rotate(180deg)' : 'rotate(0)') + '"><polyline points="6 9 12 15 18 9"/></svg>' }));
  folderDropWrapper.appendChild(folderBtn);

  // Folder dropdown panel
  if (state.mandFolderDropdownOpen) {
    const ddPanel = h("div", { style: {
      position: "absolute", top: "calc(100% + 4px)", left: "0", right: "0",
      background: "white", borderRadius: "10px", border: "1px solid " + C.border,
      boxShadow: "0 8px 24px rgba(0,0,0,0.12)", zIndex: "10",
      maxHeight: "280px", overflowY: "auto",
    }});

    if (state.mandFolderTreeLoading) {
      ddPanel.appendChild(h("div", { style: { padding: "20px", textAlign: "center", color: C.muted, fontSize: "12px" } }, "Loading folder tree..."));
    } else if (state.mandFolderTree) {
      const treeWrap = h("div", { style: { padding: "6px 0" } });
      // "All" option
      const allItem = h("div", {
        style: {
          display: "flex", alignItems: "center", gap: "8px",
          padding: "8px 14px", cursor: "pointer",
          background: !state.mandLinkFolderId ? C.gBg : "transparent",
          fontWeight: !state.mandLinkFolderId ? "600" : "400",
          color: !state.mandLinkFolderId ? C.forest : C.dark,
          fontSize: "12px", transition: "all .1s",
        },
        onMouseEnter: (e) => { if (state.mandLinkFolderId) e.currentTarget.style.background = C.pageBg; },
        onMouseLeave: (e) => { if (state.mandLinkFolderId) e.currentTarget.style.background = "transparent"; },
        onClick: (e) => {
          e.stopPropagation();
          state.mandLinkFolderId = null;
          state.mandLinkFolderPath = [];
          state.mandFolderDropdownOpen = false;
          render();
          mandSearchDocs();
        },
      });
      allItem.appendChild(h("span", { innerHTML: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>' }));
      allItem.appendChild(h("span", {}, "All Workspaces"));
      treeWrap.appendChild(allItem);

      // Recursive folder tree rendering
      function renderFolderNode(folder, depth) {
        const hasKids = folder.children && folder.children.length > 0;
        const isSelected = state.mandLinkFolderId === folder.id;
        const row = h("div", {
          style: {
            display: "flex", alignItems: "center", gap: "6px",
            padding: "7px 14px", paddingLeft: (14 + depth * 20) + "px",
            cursor: "pointer", fontSize: "12px",
            background: isSelected ? C.gBg : "transparent",
            color: isSelected ? C.forest : C.dark,
            fontWeight: isSelected ? "600" : "400",
            transition: "all .1s",
          },
          onMouseEnter: (e) => { if (!isSelected) e.currentTarget.style.background = C.pageBg; },
          onMouseLeave: (e) => { if (!isSelected) e.currentTarget.style.background = "transparent"; },
          onClick: (e) => {
            e.stopPropagation();
            // Build path from root to this folder
            const path = [];
            function findPath(nodes, targetId) {
              for (const n of nodes) {
                if (n.id === targetId) { path.push({ id: n.id, name: n.name }); return true; }
                if (n.children && n.children.length > 0) {
                  path.push({ id: n.id, name: n.name });
                  if (findPath(n.children, targetId)) return true;
                  path.pop();
                }
              }
              return false;
            }
            findPath(state.mandFolderTree, folder.id);
            state.mandLinkFolderId = folder.id;
            state.mandLinkFolderPath = path;
            state.mandLinkSearch = "";
            state.mandFolderDropdownOpen = false;
            render();
            mandSearchDocs();
          },
        });
        if (hasKids) {
          row.appendChild(h("span", { style: { fontSize: "8px", color: C.muted } }, "\u25B6"));
        }
        row.appendChild(h("span", { innerHTML: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="' + (isSelected ? C.forest : C.gray) + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>' }));
        row.appendChild(h("span", { style: { overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, folder.name));
        if (folder.documentCount > 0) {
          row.appendChild(h("span", { style: { fontSize: "9px", color: C.muted, marginLeft: "auto" } }, folder.documentCount + ""));
        }
        treeWrap.appendChild(row);
        if (hasKids) {
          folder.children.forEach(child => renderFolderNode(child, depth + 1));
        }
      }
      state.mandFolderTree.forEach(root => renderFolderNode(root, 0));
      ddPanel.appendChild(treeWrap);
    }
    folderDropWrapper.appendChild(ddPanel);
  }
  folderSection.appendChild(folderDropWrapper);
  card.appendChild(folderSection);

  // Search Bar
  const searchSection = h("div", { style: { padding: "10px 20px", borderBottom: "1px solid " + C.border } });
  const searchBar = h("div", { style: { display: "flex", alignItems: "center", gap: "8px", background: C.pageBg, borderRadius: "8px", padding: "8px 12px" } });
  searchBar.appendChild(h("span", { innerHTML: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="' + C.muted + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' }));
  let searchTimeout = null;
  const searchInput = h("input", {
    type: "text", value: state.mandLinkSearch, placeholder: "Search documents by name...",
    style: { flex: "1", border: "none", background: "transparent", fontSize: "13px", outline: "none", fontFamily: FONT, color: C.dark },
    onInput: (e) => {
      state.mandLinkSearch = e.target.value;
      if (e.target.value) {
        state.mandLinkFolderId = null;
        state.mandLinkFolderPath = [];
      }
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => mandSearchDocs(), 300);
    },
  });
  searchBar.appendChild(searchInput);
  if (state.mandLinkSearch) {
    searchBar.appendChild(h("button", {
      style: { border: "none", background: "transparent", cursor: "pointer", fontSize: "12px", color: C.muted, padding: "0" },
      onClick: () => { state.mandLinkSearch = ""; render(); mandSearchDocs(); },
    }, "Clear"));
  }
  searchSection.appendChild(searchBar);
  card.appendChild(searchSection);

  // Breadcrumb
  if (state.mandLinkFolderPath.length > 0 && !state.mandLinkSearch) {
    const breadSection = h("div", { style: { padding: "8px 20px", borderBottom: "1px solid " + C.border, display: "flex", alignItems: "center", gap: "4px", flexWrap: "wrap" } });
    breadSection.appendChild(h("span", { innerHTML: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="' + C.forest + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>' }));
    breadSection.appendChild(h("button", {
      style: { border: "none", background: "transparent", cursor: "pointer", fontSize: "11px", color: C.forest, fontWeight: "600", padding: "2px 4px", fontFamily: FONT },
      onClick: () => mandNavigateBreadcrumb(-1),
    }, "Root"));
    state.mandLinkFolderPath.forEach((f, i) => {
      const isLast = i === state.mandLinkFolderPath.length - 1;
      breadSection.appendChild(h("span", { style: { color: C.muted, fontSize: "10px" } }, "/"));
      breadSection.appendChild(h("button", {
        style: { border: "none", background: "transparent", cursor: "pointer", fontSize: "11px", fontFamily: FONT, padding: "2px 4px", color: isLast ? C.dark : C.forest, fontWeight: isLast ? "600" : "400" },
        onClick: () => mandNavigateBreadcrumb(i),
      }, f.name));
    });
    card.appendChild(breadSection);
  }

  // Results
  const results = h("div", { style: { flex: "1", overflowY: "auto", padding: "8px 0" } });
  if (state.mandLinkDocsLoading) {
    results.appendChild(h("div", { style: { textAlign: "center", padding: "40px 0", color: C.muted, fontSize: "13px" } }, "Searching Odoo documents..."));
  } else {
    // Subfolders
    if (state.mandLinkSubfolders && state.mandLinkSubfolders.length > 0) {
      const sfSection = h("div", { style: { padding: "4px 20px 8px" } });
      sfSection.appendChild(h("div", { style: { fontSize: "10px", fontWeight: "600", color: C.muted, marginBottom: "6px", textTransform: "uppercase" } }, "Subfolders"));
      state.mandLinkSubfolders.forEach(folder => {
        const sfRow = h("div", {
          style: { display: "flex", alignItems: "center", gap: "10px", padding: "8px 12px", borderRadius: "8px", cursor: "pointer", transition: "all .15s", marginBottom: "2px" },
          onMouseEnter: (e) => { e.currentTarget.style.background = C.gBg; },
          onMouseLeave: (e) => { e.currentTarget.style.background = "transparent"; },
          onClick: () => mandNavigateToFolder(folder.id, folder.name),
        });
        sfRow.appendChild(h("div", { style: { width: "28px", height: "28px", borderRadius: "6px", background: C.gBg2, color: C.forest, display: "flex", alignItems: "center", justifyContent: "center" } },
          h("span", { innerHTML: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>' })
        ));
        const sfInfo = h("div", { style: { flex: "1" } });
        sfInfo.appendChild(h("div", { style: { fontSize: "13px", fontWeight: "600", color: C.dark } }, folder.name));
        sfInfo.appendChild(h("div", { style: { fontSize: "10px", color: C.muted } }, (folder.documentCount || 0) + " document" + ((folder.documentCount || 0) !== 1 ? "s" : "")));
        sfRow.appendChild(sfInfo);
        sfRow.appendChild(h("span", { innerHTML: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="' + C.muted + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' }));
        sfSection.appendChild(sfRow);
      });
      results.appendChild(sfSection);
    }

    // Documents
    if (state.mandLinkDocs && state.mandLinkDocs.length > 0) {
      const docsSection = h("div", { style: { padding: "4px 20px" } });
      const docsLabel = state.mandLinkSearch ? 'Documents (search: "' + state.mandLinkSearch + '")' : "Documents (" + state.mandLinkDocs.length + ")";
      docsSection.appendChild(h("div", { style: { fontSize: "10px", fontWeight: "600", color: C.muted, marginBottom: "6px", textTransform: "uppercase" } }, docsLabel));
      state.mandLinkDocs.forEach(doc => {
        const ext = doc.fileExtension ? doc.fileExtension.toUpperCase().slice(0, 3) : "DOC";
        const docRow = h("div", {
          style: { display: "flex", alignItems: "center", gap: "10px", padding: "10px 12px", borderRadius: "8px", cursor: "pointer", transition: "all .15s", marginBottom: "2px", border: "1px solid transparent" },
          onMouseEnter: (e) => { e.currentTarget.style.background = C.gBg; e.currentTarget.style.borderColor = C.gBdr; },
          onMouseLeave: (e) => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderColor = "transparent"; },
          onClick: () => mandLinkDocument(doc),
        });
        docRow.appendChild(h("div", { style: { width: "32px", height: "32px", borderRadius: "6px", background: C.gBg2, color: C.forest, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "10px", fontWeight: "700", flexShrink: "0" } }, ext));
        const docInfo = h("div", { style: { flex: "1", minWidth: "0" } });
        docInfo.appendChild(h("div", { style: { fontSize: "13px", fontWeight: "600", color: C.dark, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, doc.name));
        const meta = h("div", { style: { fontSize: "10px", color: C.muted, display: "flex", gap: "8px" } });
        if (doc.folderName) meta.appendChild(h("span", {}, "\ud83d\udcc1 " + doc.folderName));
        if (doc.fileSize > 0) meta.appendChild(h("span", {}, fmtSize(doc.fileSize)));
        if (doc.createDate) meta.appendChild(h("span", {}, fmtDate(doc.createDate)));
        docInfo.appendChild(meta);
        docRow.appendChild(docInfo);
        docRow.appendChild(h("div", { style: { fontSize: "10px", color: C.forest, fontWeight: "600", padding: "4px 10px", borderRadius: "6px", background: C.gBg, flexShrink: "0", border: "1px solid " + C.gBdr } }, "Link"));
        docsSection.appendChild(docRow);
      });
      results.appendChild(docsSection);
    }

    // Empty state
    if ((!state.mandLinkDocs || state.mandLinkDocs.length === 0) && (!state.mandLinkSubfolders || state.mandLinkSubfolders.length === 0)) {
      const empty = h("div", { style: { textAlign: "center", padding: "40px 0", color: C.muted } });
      empty.appendChild(h("div", { innerHTML: '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="' + C.muted + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 8px;opacity:0.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' }));
      if (state.mandLinkSearch) {
        empty.appendChild(h("div", { style: { fontSize: "13px" } }, 'No documents found for "' + state.mandLinkSearch + '"'));
      } else if (state.mandLinkFolderId) {
        empty.appendChild(h("div", { style: { fontSize: "13px" } }, "No documents in this folder"));
      } else {
        empty.appendChild(h("div", { style: { fontSize: "13px" } }, "Select a folder above to browse documents"));
        empty.appendChild(h("div", { style: { fontSize: "11px", marginTop: "4px", color: C.muted } }, "Or use the search bar to find documents by name"));
      }
      results.appendChild(empty);
    }
  }
  card.appendChild(results);

  bg.appendChild(card);
  return bg;
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (state.loading) {
    app.appendChild(h("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", flexDirection: "column", gap: "12px" } },
      h("div", { style: { width: "40px", height: "40px", border: "3px solid " + C.border, borderTopColor: C.forest, borderRadius: "50%", animation: "spin 1s linear infinite" } }),
      h("div", { style: { fontSize: "14px", color: C.gray } }, "Loading documents from Odoo...")
    ));
    // Add spin animation
    if (!document.getElementById("spin-style")) {
      const style = document.createElement("style");
      style.id = "spin-style";
      style.textContent = "@keyframes spin{to{transform:rotate(360deg)}}";
      document.head.appendChild(style);
    }
    return;
  }

  const layout = h("div", { style: { display: "flex", flexDirection: "column", height: "100vh" } });
  layout.appendChild(renderHeader());
  const body = h("div", { style: { display: "flex", flex: "1", minHeight: "0" } });
  if (state.page === "dashboard") {
    body.appendChild(renderDashboard());
  } else {
    body.appendChild(renderBrowse());
  }
  layout.appendChild(body);
  app.appendChild(layout);

  const modal = renderModal();
  if (modal) app.appendChild(modal);

  const mandEdit = renderMandEditModal();
  if (mandEdit) app.appendChild(mandEdit);

  const mandLink = renderMandLinkModal();
  if (mandLink) app.appendChild(mandLink);
}

// Close dropdowns on outside click
document.addEventListener("click", () => {
  if (state.companyDropdownOpen) setState({ companyDropdownOpen: false });
  if (state.mandFolderDropdownOpen) setState({ mandFolderDropdownOpen: false });
});

// Initial load — first fetch companies from Odoo API, then load all data
(async () => {
  await loadCompanyObjects();
  render(); // re-render with the real company list
  await loadAllData();
})();
</script>
</body>
</html>
